<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Laser Chess Standard - Standard Variant(Core Edition)</title>
    <style>
        @font-face {
            font-family: 'Unifont';
            src: url('https://cdn.jsdelivr.net/npm/gnu-unifont@1.0.0/unifont.woff2') format('woff2');
        }

        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            color: #b0b0b0; 
            font-family: 'Unifont', monospace;
            margin: 0;
            padding: 30px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        #terminal-log {
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .input-area {
            display: flex;
            margin-top: 10px;
        }

        #prompt { margin-right: 10px; color: #d0d0d0; }

        input {
            background: transparent;
            border: none;
            color: #ffffff;
            font-family: 'Unifont', monospace;
            font-size: inherit;
            outline: none;
            width: 100%;
        }

        .system-msg { color: #666666; }
        .success-msg { color: #888888; font-weight: bold; }
        .error-msg { color: #ff5555; }
        .highlight { color: #ffffff; }
        .user-entry { color: #d0d0d0; margin-bottom: 20px; border-left: 2px solid #333; padding-left: 10px; }
    </style>
</head>
<body>

<div id="terminal-log"></div>

<div class="input-area">
    <span id="prompt"></span>
    <input type="text" id="user-input" autofocus autocomplete="off">
</div>

<script>
    const log = document.getElementById('terminal-log');
    const input = document.getElementById('user-input');
    const prompt = document.getElementById('prompt');

    let currentState = "INIT";
    let tempUser = "";

    // The Typing Engine
    function typeOut(text, className = "", speed = 40) {
        const div = document.createElement('div');
        div.className = className;
        log.appendChild(div);

        let i = 0;
        const timer = setInterval(() => {
            if (i < text.length) {
                div.textContent += text.charAt(i);
                i++;
            } else {
                clearInterval(timer);
            }
        }, speed);
    }

    window.onload = () => {
        typeOut("Welcome to Laser Chess Online (Core Edition) - Standard Variant!", "highlight");
        
        const storedUser = localStorage.getItem('session_user');
        const storedPass = localStorage.getItem('session_pass');

        // Delay checks slightly to allow the welcome message to start
        setTimeout(() => {
            if (storedUser && storedPass) {
                typeOut(`RETURNING OPERATOR: ${storedUser}`, "system-msg");
                typeOut(`Session Username: ${storedUser}`);
                typeOut(`Session Password: ${storedPass}`, "user-entry");
                initSessionCreated();
            } else {
                startLoginSequence();
            }
        }, 500);
    };

    function startLoginSequence() {
        typeOut("--- NEW SESSION INITIALIZED ---", "system-msg");
        prompt.textContent = "Session Username:";
        currentState = "USERNAME";
    }

    input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const val = input.value.trim();
            handleSequence(val);
            input.value = "";
        }
    });

    function handleSequence(val) {
        const currentPrompt = prompt.textContent;
        
        switch(currentState) {
            case "USERNAME":
                tempUser = val;
                typeOut(`${currentPrompt} ${val}`, "user-entry");
                prompt.textContent = "Session Password:";
                currentState = "PASSWORD";
                break;

            case "PASSWORD":
                if (val.length === 0 || val.length > 20) {
                    typeOut(`${currentPrompt} ${val}`, "error-msg");
                    typeOut("ERROR: PASSWORD MUST BE 1-20 CHARACTERS.", "error-msg");
                    return;
                }
                localStorage.setItem('session_user', tempUser);
                localStorage.setItem('session_pass', val);
                typeOut(`${currentPrompt} ${val}`, "user-entry");
                initSessionCreated();
                break;
        }
    }

    function initSessionCreated() {
        setTimeout(() => {
            typeOut("Local Session created.", "success-msg");
            typeOut("Type R/B/A/PR/PB to proceed.");
            prompt.textContent = ">";
            currentState = "MODE_SELECT";
        }, 1000);
    }
</script>

</body>
</html>
