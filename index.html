<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Laser Chess Core</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        .input-line { display: flex; }
        input { background: transparent; border: none; color: #fff; outline: none; flex: 1; font-family: monospace; }
        .err { color: #f55; }
        .ok { color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <div id="log"></div>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>

<script>
    // Verification log
    console.log("Terminal Initializing...");

    const config = {
        apiKey: "AIzaSyBuT7P1iTdXcZW-y05DX-kseuLrPGmaWSs",
        authDomain: "laserchess-web-free.firebaseapp.com",
        databaseURL: "https://laserchess-web-free-default-rtdb.firebaseio.com",
        projectId: "laserchess-web-free"
    };

    firebase.initializeApp(config);
    const db = firebase.database();
    const logEl = document.getElementById('log');
    
    let user = localStorage.getItem('ls_user');
    let pass = localStorage.getItem('ls_pass');
    let activeMatch = null;

    function out(txt, cls = "") {
        const d = document.createElement('div');
        d.className = cls;
        d.innerHTML = txt;
        logEl.appendChild(d);
        window.scrollTo(0, document.body.scrollHeight);
    }

    function ask(txt, cb) {
        const w = document.createElement('div');
        w.className = "input-line";
        w.innerHTML = `<span>${txt}&nbsp;</span><input type="text">`;
        logEl.appendChild(w);
        const i = w.querySelector('input');
        i.focus();
        i.onkeydown = (e) => {
            if (e.key === 'Enter') {
                const val = i.value.trim().toUpperCase();
                i.disabled = true;
                cb(val);
            }
        };
    }

    function initSync() {
        out("--- CONNECTED TO LOBBY ---", "ok");
        db.ref('fifo_enforcer').orderByKey().limitToFirst(1).on('value', snap => {
            if (snap.exists()) {
                let mId, et;
                snap.forEach(c => { mId = c.key; et = c.val().et; });
                db.ref(`matches/${mId}/public_data`).once('value', pSnap => {
                    activeMatch = { id: mId, et: et, data: pSnap.val() };
                    showMenu();
                });
            } else {
                activeMatch = null;
                showMenu();
            }
        });
    }

    function showMenu() {
        if (activeMatch) {
            const side = activeMatch.data.rn ? "RED" : "BLUE";
            out(`QUEUE TOP: ${activeMatch.id} [Occupied: ${side}]`, "ok");
            out("[A] JOIN OPPOSITE | [R] NEW RED | [B] NEW BLUE");
        } else {
            out("QUEUE EMPTY. [R] NEW RED | [B] NEW BLUE");
        }
        ask("COMMAND>", handleCmd);
    }

    function handleCmd(val) {
        if (val === "R") {
            if (activeMatch?.data?.rn) return out("RED EXISTS. USE [A]", "err"), showMenu();
            createMatch(1);
        } else if (val === "B") {
            if (activeMatch?.data?.bn) return out("BLUE EXISTS. USE [A]", "err"), showMenu();
            createMatch(0);
        } else if (val === "A" && activeMatch) {
            joinMatch(activeMatch.data.rn ? 0 : 1);
        } else {
            out("INVALID", "err");
            showMenu();
        }
    }

    function createMatch(col) {
        const id = Date.now().toString();
        const et = Math.random().toString(36).substring(7);
        const upd = {};
        upd[`fifo_enforcer/${id}/et`] = et;
        upd[`matches/${id}/public_data/${col ? 'rn' : 'bn'}`] = user;
        upd[`matches/${id}/private_tokens/et`] = et;
        upd[`matches/${id}/private_tokens/${col ? 'redpassword' : 'bluepassword'}`] = pass;
        db.ref().update(upd).then(() => out("MATCH CREATED", "ok"));
    }

    function joinMatch(col) {
        const upd = {};
        upd[`fifo_enforcer/${activeMatch.id}`] = null;
        upd[`matches/${activeMatch.id}/public_data/${col ? 'rn' : 'bn'}`] = user;
        upd[`matches/${activeMatch.id}/private_tokens/et`] = activeMatch.et;
        upd[`matches/${activeMatch.id}/private_tokens/${col ? 'redpassword' : 'bluepassword'}`] = pass;
        db.ref().update(upd).then(() => out("JOINED SUCCESS", "ok")).catch(e => out("FAIL", "err"));
    }

    // Startup
    out("LASER CHESS v1.0.5");
    if (!user) {
        ask("USER:", (v) => { user = v; localStorage.setItem('ls_user', v); location.reload(); });
    } else if (!pass) {
        ask("PASS:", (v) => { pass = v; localStorage.setItem('ls_pass', v); location.reload(); });
    } else {
        initSync();
    }
</script>
</body>
</html>
