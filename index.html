<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KHET_ULTIMATE_ASCII_RENDERER</title>
    <style>
        @font-face {
            font-family: 'Unifont';
            src: url('unifont-15.0.01.ttf') format('truetype');
            font-display: block;
        }

        body { 
            background: #000; 
            color: #0f0; 
            font-family: 'Unifont', monospace; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #terminal {
            background: #050505;
            padding: 20px;
            border: 2px solid #333;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.1);
            display: inline-block;
        }

        pre {
            font-size: 24px;
            line-height: 1;
            margin: 0;
            font-family: 'Unifont', monospace;
            white-space: pre-wrap;
        }

        .u {
            display: inline-block;
            width: 24px;
            height: 24px;
            text-align: center;
            line-height: 24px;
            vertical-align: middle;
        }

        .b { color: #00d4ff; font-weight: bold; } /* BLUE */
        .r { color: #ff3333; font-weight: bold; } /* RED */
        .d { color: #333; }    /* EMPTY DOT */
        .label { color: #777; } /* AXIS LABELS */
        
        .input-area {
            margin-top: 20px;
            width: 100%;
            max-width: 800px;
        }

        input {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 12px;
            font-family: 'Unifont', monospace;
            outline: none;
            font-size: 18px;
        }

        .status-bar { 
            display: flex; 
            justify-content: space-between; 
            width: 100%; 
            color: #888; 
            font-size: 16px;
            margin-top: 8px;
            text-transform: uppercase;
        }
        
        .rules {
            margin-top: 20px;
            color: #555;
            font-size: 14px;
            width: 100%;
            max-width: 800px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div id="terminal">
    <pre id="screen">_</pre>
</div>

<div class="input-area">
    <input type="text" id="raw-input" placeholder="PASTE: T(0-9) X(0-9) Y(0-7) R(0-4) S(0-1)..." autocomplete="off" oninput="processInput()">
    <div class="status-bar">
        <span id="turn-info">TURN: --</span>
        <span id="digit-count">LEN: 0</span>
    </div>
</div>

<div class="rules">
    > SYMBOL MAP ACTIVE:<br>
    > 0/5=KING(◈) | 1/6=LASER(⫝⟜ͲÐ) | 2/7=SWITCH(⟋⟍) | 3/8=DEFENDER(⬒◨⬓◧) | 4/9=DEFLECTOR(◤◥◢◣)<br>
    > ROTATION: 0=FIXED, 1=N, 2=E, 3=S, 4=W | STATE: 0=DEAD, 1=ALIVE
</div>

<script>
    const screen = document.getElementById('screen');
    const inputField = document.getElementById('raw-input');
    const counter = document.getElementById('digit-count');
    const turnInfo = document.getElementById('turn-info');

    const getSymbol = (type, rot) => {
        switch(type) {
            case 0: case 5: 
                return "◈"; // King (Unrotatable)
            
            case 1: case 6: // Laser
                if (rot === 1) return "⫝"; // N
                if (rot === 2) return "⟜"; // E
                if (rot === 3) return "Ͳ"; // S
                if (rot === 4) return "Ð"; // W
                return "?"; 

            case 2: case 7: // Switches
                if (rot === 1 || rot === 3) return "⟋"; // N / S
                if (rot === 2 || rot === 4) return "⟍"; // E / W
                return "?";

            case 3: case 8: // Defenders
                if (rot === 1) return "⬒"; // N
                if (rot === 2) return "◨"; // E
                if (rot === 3) return "⬓"; // S
                if (rot === 4) return "◧"; // W
                return "?";

            case 4: case 9: // Deflectors
                if (rot === 1) return "◤"; // N
                if (rot === 2) return "◥"; // E
                if (rot === 3) return "◢"; // S
                if (rot === 4) return "◣"; // W
                return "?";

            default: return "?";
        }
    };

    function processInput() {
        const raw = inputField.value.trim().replace(/\s/g, '');
        counter.innerText = `LEN: ${raw.length}`;
        
        if (raw.length === 0) {
            screen.innerHTML = "_";
            turnInfo.innerHTML = "TURN: --";
            return;
        }

        // Initialize 10x8 empty grid
        const grid = Array(8).fill(0).map(() => Array(10).fill(null));
        const pieceCount = Math.floor(raw.length / 5);

        for (let i = 0; i < pieceCount; i++) {
            const block = raw.substr(i * 5, 5);
            
            const type = parseInt(block[0]); 
            const x    = parseInt(block[1]); 
            const y    = parseInt(block[2]); 
            const r    = parseInt(block[3]); 
            const s    = parseInt(block[4]); 

            // If state is 0 (Dead), we skip rendering it entirely
            if (s === 0) continue; 

            // Validate boundaries before placing
            if (!isNaN(type) && !isNaN(x) && !isNaN(y) && y >= 0 && y < 8 && x >= 0 && x < 10) {
                const side = (type <= 4) ? "b" : "r";
                grid[y][x] = { char: getSymbol(type, r), side: side };
            }
        }

        // Render X-axis header
        let out = "<span class='u label'> </span>";
        for(let i=0; i<10; i++) out += `<span class='u label'>${i}</span>`;
        out += "\n";

        // Render Grid (Y=7 down to 0)
        for (let y = 7; y >= 0; y--) {
            out += `<span class='u label'>${y}</span>`; // Y-axis label
            for (let x = 0; x < 10; x++) {
                const cell = grid[y][x];
                if (cell) {
                    out += `<span class="u ${cell.side}">${cell.char}</span>`;
                } else {
                    out += `<span class="u d">·</span>`;
                }
            }
            out += "\n";
        }

        // Check for turn digit: If there's exactly 1 extra digit after sets of 5
        if (raw.length % 5 === 1) {
            const turnDigit = raw.substr(-1);
            if (turnDigit === "0") {
                turnInfo.innerHTML = 'TURN: <span class="b">BLUE</span>';
            } else if (turnDigit === "1" || turnDigit === "5") { // Handling multiple possible Red indicators just in case
                turnInfo.innerHTML = 'TURN: <span class="r">RED</span>';
            } else {
                turnInfo.innerHTML = `TURN: ${turnDigit}`;
            }
        } else {
            turnInfo.innerHTML = "TURN: --";
        }
        
        screen.innerHTML = out;
    }
    
    // Auto-initialize with an empty board format
    processInput();
</script>
</body>
</html>
