<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LASER CHESS STANDARD VARIANT(THINKFUN) - CORE EDITION(BETA η- Version)</title>
    <style>
        @font-face {
            font-family: 'Unifont';
            src: url('unifont-15.0.01.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: block;
        }

        body {
            background-color: #0a0a0a;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            color: #b0b0b0;
            font-family: 'Unifont', monospace;
            font-size: 16px;
            margin: 0;
            padding: 30px;
            line-height: 1.6;
            image-rendering: pixelated;
        }

        #terminal-log {
            display: flex;
            flex-direction: column;
        }

        .input-wrapper {
            display: flex;
            align-items: baseline;
            margin-top: 5px;
        }

        .user-input-line {
            background: transparent;
            border: none;
            color: #ffffff;
            font-family: 'Unifont', monospace;
            font-size: 16px;
            outline: none;
            flex-grow: 1;
            margin-left: 8px;
            caret-color: #ffffff;
        }

        .system-msg { color: #999; }
        .success-msg { color: #ffffff; font-weight: bold; text-shadow: 0 0 5px #fff; }
        .error-msg { color: #ff5555; }
        .highlight { color: #ffffff; font-weight: bold; }
        .history-line { margin-bottom: 4px; min-height: 1.6em; }
    </style>
</head>
<body>

<div id="terminal-log"></div>

<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-database-compat.js"></script>

<script>
    const matchFirebaseConfig = {
        apiKey: "AIzaSyDv7keBI4B-TMp5hcVAYHeMfgWJdLHLJbE",
        authDomain: "laser-chess-low-efficiency.firebaseapp.com",
        databaseURL: "https://laser-chess-low-efficiency-default-rtdb.firebaseio.com",
        projectId: "laser-chess-low-efficiency"
    };

    const matchApp = firebase.initializeApp(matchFirebaseConfig);
    const matchDb = firebase.database(matchApp);

    const log = document.getElementById('terminal-log');
    let msgQueue = [];
    let isProcessing = false;

    function addToQueue(text, className = "", isRequest = false) {
        msgQueue.push({ text, className, isRequest });
        if (!isProcessing) processQueue();
    }

    async function processQueue() {
        isProcessing = true;
        while (msgQueue.length > 0) {
            const item = msgQueue.shift();
            if (item.isRequest) await typeLineInline(item.text, item.className);
            else await typeLineSimple(item.text, item.className);
        }
        isProcessing = false;
    }

    function typeLineSimple(text, className) {
        return new Promise((resolve) => {
            const div = document.createElement('div');
            div.className = "history-line " + className;
            log.appendChild(div);

            let i = 0;
            const timer = setInterval(() => {
                if (i < text.length) {
                    div.textContent += text.charAt(i++);
                } else {
                    clearInterval(timer);
                    resolve();
                }
            }, 12);
        });
    }

    function typeLineInline(text, className) {
        return new Promise((resolve) => {
            const wrapper = document.createElement('div');
            wrapper.className = "input-wrapper history-line " + className;
            wrapper.innerHTML = `<span></span><input type="text" class="user-input-line" autocomplete="off">`;
            log.appendChild(wrapper);

            const label = wrapper.querySelector('span');
            const input = wrapper.querySelector('input');

            let i = 0;
            const timer = setInterval(() => {
                if (i < text.length) {
                    label.textContent += text.charAt(i++);
                } else {
                    clearInterval(timer);
                    input.focus();

                    input.onkeydown = (e) => {
                        if (e.key === 'Enter') {
                            const val = input.value.trim().toUpperCase();
                            input.disabled = true;
                            handleAuth(val);
                            resolve();
                        }
                    };
                }
            }, 12);
        });
    }

    function handleAuth(val) {
        const u = localStorage.getItem('ls_user');

        if (!u) {
            if (!val) {
                addToQueue("USERNAME REQUIRED:", "error-msg", true);
                return;
            }
            localStorage.setItem('ls_user', val);
            addToQueue(`USER SAVED: ${val}`, "success-msg");
            bootSequence();
            return;
        }

        const p = localStorage.getItem('ls_pass');
        if (!p) {
            if (!val) {
                addToQueue("PASSKEY REQUIRED:", "error-msg", true);
                return;
            }
            localStorage.setItem('ls_pass', val);
            addToQueue("PASSKEY SAVED.", "success-msg");
            bootSequence();
        }
    }

    async function checkExistingRequest() {
        const requestId = localStorage.getItem('ls_request');
        if (!requestId) return;

        addToQueue("SAVED REQUEST DETECTED.", "highlight");
        addToQueue("CHECKING MATCH DATABASE...", "system-msg");
        addToQueue(`LOOKUP: R/${requestId}`, "system-msg");

        try {
            const snap = await matchDb.ref(`R/${requestId}`).once('value');
            const data = snap.val();

            if (data) {
                addToQueue("REQUEST FOUND ✓", "success-msg");
                addToQueue("MATCH LINKED.", "success-msg");
            } else {
                addToQueue("REQUEST NOT FOUND ✗", "error-msg");
                addToQueue("LOCAL REQUEST CLEARED.", "system-msg");
                localStorage.removeItem('ls_request');
            }
        } catch (e) {
            console.log("Request read failed:", e);
            addToQueue("REQUEST READ FAILED.", "error-msg");
        }
    }

    async function bootSequence() {
        const u = localStorage.getItem('ls_user');
        const p = localStorage.getItem('ls_pass');

        if (!u) {
            addToQueue("LASER CHESS STANDARD VARIANT(THINKFUN) - CORE EDITION(BETA η- Version)  v1.0.6", "highlight");
            addToQueue("IDENTIFY USER:", "", true);
            return;
        }

        if (!p) {
            addToQueue(`WELCOME BACK, ${u}.`, "highlight");
            addToQueue("ENTER PASSKEY:", "", true);
            return;
        }

        addToQueue("AUTH COMPLETE. GAME READY.", "success-msg");

        if (localStorage.getItem('ls_request')) {
            await checkExistingRequest();
        }
    }

    (async () => {
        try {
            if (document.fonts && document.fonts.load) {
                await document.fonts.load('16px Unifont');
                await document.fonts.ready;
            }
        } catch (e) {
            console.log("Font load issue:", e);
        }

        bootSequence();
    })();
</script>

</body>
</html>
