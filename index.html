<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LASER CHESS STANDARD VARIANT (THINKFUN) - CORE EDITION (BETA η- Version)</title>
  <style>
    @font-face {
      font-family: 'Unifont';
      src: url('unifont-15.0.01.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: block;
    }

    :root {
      --bg0: #0a0a0a;
      --bg1: #1a1a1a;
      --text: #b0b0b0;
      --bright: #ffffff;
      --error: #ff5555;
      --muted: #999999;
    }

    body {
      margin: 0;
      padding: 30px;
      color: var(--text);
      font-family: 'Unifont', monospace;
      font-size: 16px;
      line-height: 1.6;
      background: radial-gradient(circle at center, var(--bg1) 0%, var(--bg0) 100%);
      image-rendering: pixelated;
      font-variant-ligatures: none;
    }

    #terminal-log {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 1100px;
    }

    .history-line { min-height: 1.6em; white-space: pre-wrap; }

    .input-wrapper {
      display: flex;
      gap: 8px;
      align-items: baseline;
    }

    .prompt { white-space: pre; }

    .user-input-line {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--bright);
      font: inherit;
      font-family: 'Unifont', monospace;
    }

    .system-msg { color: var(--muted); }
    .success-msg { color: var(--bright); font-weight: 700; }
    .error-msg { color: var(--error); }
    .highlight { color: var(--bright); font-weight: 700; }
  </style>
</head>

<body>
<div id="terminal-log"></div>

<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-database-compat.js"></script>

<script>
(() => {
  'use strict';

  const matchFirebaseConfig = {
    apiKey: "AIzaSyBpOnnJInXkDPZ8hrKj-rpjw3qeTylxtw4",
    authDomain: "lasercheowefficiencymanager.firebaseapp.com",
    databaseURL: "https://lasercheowefficiencymanager-default-rtdb.firebaseio.com",
    projectId: "lasercheowefficiencymanager",
    storageBucket: "lasercheowefficiencymanager.firebasestorage.app",
    messagingSenderId: "28090691314",
    appId: "1:28090691314:web:e8c8ae5b0fd437038b6a6b"
  };

  // ✅ YOUR WORKER
  const WORKER_URL = 'https://laserchessnexus-matchmanager-v-alpha.later5143.workers.dev/match';

  const app = firebase.apps?.length ? firebase.app() : firebase.initializeApp(matchFirebaseConfig);
  const db = firebase.database(app);

  const KEY_USER = 'ls_user';
  const KEY_PASS = 'ls_pass';
  const KEY_REQUEST = 'ls_request';

  const PATH_REQUESTS = 'R';
  const PATH_QUEUE = 'RQ';

  const log = document.getElementById('terminal-log');
  const queue = [];
  let processing = false;

  const sleep = (ms) => new Promise(r => setTimeout(r, ms));

  function line(cls='') {
    const d = document.createElement('div');
    d.className = `history-line ${cls}`.trim();
    log.appendChild(d);
    return d;
  }

  function add(text, cls='', req=false, handler=null) {
    queue.push({text,cls,req,handler});
    if (!processing) run();
  }

  async function run() {
    processing = true;
    while(queue.length) {
      const i = queue.shift();
      if (i.req) await prompt(i.text, i.cls, i.handler || handleAuth);
      else await type(i.text, i.cls);
    }
    processing = false;
  }

  async function type(text, cls) {
    const l = line(cls);
    for (let c of text) {
      l.textContent += c;
      await sleep(10);
    }
  }

  function waitEnter(input, cb) {
    return new Promise(resolve => {
      const submit = () => {
        const v = input.value.trim().toUpperCase();
        input.disabled = true;

        const wrap = input.parentElement;
        const p = wrap?.querySelector('.prompt')?.textContent ?? '';

        line('highlight').textContent = p + v;

        wrap?.remove();
        cb(v);
        resolve();
      };

      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') submit();
      });
    });
  }

  async function prompt(text, cls, handler) {
    const wrap = document.createElement('div');
    wrap.className = 'input-wrapper history-line';

    const p = document.createElement('span');
    p.className = 'prompt';
    wrap.appendChild(p);

    const input = document.createElement('input');
    input.className = 'user-input-line';
    wrap.appendChild(input);

    log.appendChild(wrap);

    for (let c of text) {
      p.textContent += c;
      await sleep(8);
    }

    setTimeout(() => input.focus(), 0);
    await waitEnter(input, handler);
  }

  function showMode() {
    add('Select mode:', 'system-msg');
    add('PR / PB / R / B', 'system-msg');
    add('ENTER MODE:', '', true, handleMode);
  }

  async function handleMode(val) {
    if (!val) return add('Mode required.', 'error-msg', true, handleMode);
    if (!['PR','PB','R','B'].includes(val)) {
      add('Invalid mode.', 'error-msg');
      return showMode();
    }

    add(`Mode: ${val}`, 'success-msg');
    add('Attempting.', 'system-msg');

    try {
      const res = await fetch(WORKER_URL, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ mode: val })
      });

      const data = await res.json().catch(()=> ({}));

      // ✅ QUOTA HANDLING
      if (res.status === 429 || data?.error?.toLowerCase?.().includes('quota')) {
        add('Out of quota.', 'error-msg');
        add('Come back tomorrow.', 'error-msg');
        return showMode();
      }

      if (!res.ok) throw new Error('fail');

      if (data.matchId) {
        add('Match created.', 'success-msg');
        add('Waiting.', 'highlight');
      } else if (data.joinedMatchId) {
        add('Match joined.', 'success-msg');
        add('Starting.', 'highlight');
      } else {
        add('Unexpected response.', 'error-msg');
      }

    } catch (e) {
      // ✅ FAIL SAFE
      add('Failed.', 'error-msg');
      add('Try again.', 'error-msg');
    }
  }

  async function handleAuth(v) {
    const u = localStorage.getItem(KEY_USER);
    const p = localStorage.getItem(KEY_PASS);

    if (!u) {
      if (!v) return add('Username required.', 'error-msg', true, handleAuth);
      localStorage.setItem(KEY_USER, v);
      add('User set.', 'success-msg');
      return boot();
    }

    if (!p) {
      if (!v) return add('Pass required.', 'error-msg', true, handleAuth);
      localStorage.setItem(KEY_PASS, v);
      add('Auth set.', 'success-msg');
      return boot();
    }
  }

  async function boot() {
    const u = localStorage.getItem(KEY_USER);
    const p = localStorage.getItem(KEY_PASS);

    if (!u) return add('User:', '', true, handleAuth);
    if (!p) return add(`Welcome ${u}`, 'highlight'), add('Pass:', '', true, handleAuth);

    add('Ready.', 'success-msg');
    showMode();
  }

  window.addEventListener('DOMContentLoaded', boot);

})();
</script>
</body>
</html>
