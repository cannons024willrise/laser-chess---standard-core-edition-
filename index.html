<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laser Chess - Standard Version (Core Edition)</title>
    <style>
        @font-face {
            font-family: 'Unifont';
            src: url('unifont-15.0.01.ttf') format('truetype');
            font-display: block;
        }

        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            color: #b0b0b0; 
            font-family: 'Unifont', monospace;
            font-size: 16px; 
            margin: 0; 
            padding: 30px; 
            line-height: 1.6;
            image-rendering: pixelated;
        }

        #terminal-log { display: flex; flex-direction: column; }
        .input-wrapper { display: flex; align-items: baseline; margin-top: 5px; }
        
        .user-input-line {
            background: transparent; border: none; color: #ffffff;
            font-family: 'Unifont', monospace; font-size: 16px;
            outline: none; flex-grow: 1; margin-left: 8px; caret-color: #ffffff;
        }

        .system-msg { color: #666; margin-bottom: 5px; }
        .success-msg { color: #ffffff; font-weight: bold; margin-bottom: 5px; }
        .error-msg { color: #ff5555; margin-bottom: 5px; }
        .highlight { color: #ffffff; margin-bottom: 10px; font-weight: bold; }
        .rules-link { color: #4444ff; text-decoration: underline; font-weight: bold; }
        .history-line { margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="terminal-log"></div>

<script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBuT7P1iTdXcZW-y05DX-kseuLrPGmaWSs",
        authDomain: "laserchess-web-free.firebaseapp.com",
        databaseURL: "https://laserchess-web-free-default-rtdb.firebaseio.com",
        projectId: "laserchess-web-free",
        storageBucket: "laserchess-web-free.firebasestorage.app",
        messagingSenderId: "887464510754",
        appId: "1:887464510754:web:aee6938681543602a4517b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const SERVER_TIMESTAMP = firebase.database.ServerValue.TIMESTAMP;
    
    // Programmatic Zero-Indexed Initial State (0=N, 1=E, 2=S, 3=W)
    const INIT_STATE = "0400155701190016072124301253117441175401847018670133021350219261147131435219620142411423219043190301974019733149421493110";

    const log = document.getElementById('terminal-log');
    let msgQueue = [];
    let isProcessing = false;
    let currentState = "USERNAME";
    let tempUser = "";

    function addToQueue(text, className = "", isRequest = false) {
        msgQueue.push({ text, className, isRequest });
        if (!isProcessing) processQueue();
    }

    async function processQueue() {
        isProcessing = true;
        while (msgQueue.length > 0) {
            const item = msgQueue.shift();
            if (item.isRequest) await typeLineInline(item.text, item.className);
            else await typeLineSimple(item.text, item.className);
        }
        isProcessing = false;
    }

    function typeLineSimple(text, className) {
        return new Promise((resolve) => {
            const div = document.createElement('div');
            div.className = (className || "") + " history-line";
            log.appendChild(div);
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = text;
            const plainText = tempDiv.textContent;
            let i = 0;
            const timer = setInterval(() => {
                if (i < plainText.length) { div.textContent += plainText.charAt(i); i++; }
                else {
                    clearInterval(timer);
                    div.innerHTML = text; 
                    window.scrollTo(0, document.body.scrollHeight);
                    resolve();
                }
            }, 12);
        });
    }

    function typeLineInline(text, className) {
        return new Promise((resolve) => {
            const wrapper = document.createElement('div');
            wrapper.className = "input-wrapper history-line " + (className || "");
            const label = document.createElement('span');
            const input = document.createElement('input');
            input.type = "text"; input.className = "user-input-line";
            input.maxLength = 20; input.disabled = true;
            wrapper.appendChild(label); wrapper.appendChild(input);
            log.appendChild(wrapper);
            let i = 0;
            const timer = setInterval(() => {
                if (i < text.length) { label.textContent += text.charAt(i); i++; }
                else {
                    clearInterval(timer);
                    input.disabled = false; input.focus();
                    window.scrollTo(0, document.body.scrollHeight);
                    const handleEnter = (e) => {
                        if (e.key === 'Enter') {
                            const val = input.value.trim().toUpperCase();
                            input.disabled = true;
                            input.removeEventListener('keydown', handleEnter);
                            handleStateLogic(val);
                            resolve(); 
                        }
                    };
                    input.addEventListener('keydown', handleEnter);
                }
            }, 12); 
        });
    }

    function handleStateLogic(val) {
        if (currentState === "USERNAME") {
            if (!val) { addToQueue("Username required:", "error-msg", true); return; }
            tempUser = val; currentState = "PASSWORD";
            addToQueue("Session Password:", "", true);
        } else if (currentState === "PASSWORD") {
            if (!val) { addToQueue("Password required:", "error-msg", true); return; }
            authenticateUser(tempUser, val);
        } else if (currentState === "MODE_SELECT") {
            executeMatchmaking(val);
        }
    }

    function authenticateUser(u, p) {
        addToQueue("VERIFYING CREDENTIALS...", "system-msg");
        const hb = { password: p, lastplayed: SERVER_TIMESTAMP };
        db.ref('a/' + u).set(hb).then(() => {
            finalizeLogin(u, p);
        }).catch(() => {
            const up = {}; up['s/' + u] = p; up['a/' + u] = hb;
            db.ref().update(up).then(() => finalizeLogin(u, p)).catch(() => {
                addToQueue("ACCESS DENIED: USERNAME TAKEN OR WRONG PASSWORD.", "error-msg");
                currentState = "USERNAME"; addToQueue("Session Username:", "", true);
            });
        });
    }

    function finalizeLogin(u, p) {
        localStorage.setItem('session_user', u);
        localStorage.setItem('session_pass', p);
        addToQueue("IDENTITY CONFIRMED.", "success-msg");
        runJanitorSweep();
        promptMode();
    }

    function promptMode() {
        currentState = "MODE_SELECT";
        addToQueue("SELECT SIDE:", "highlight");
        addToQueue("[R] RED / [B] BLUE", "system-msg");
        addToQueue("Choose:", "", true);
    }

    function executeMatchmaking(cmd) {
        const pass = localStorage.getItem('session_pass');
        let color = (cmd === "R") ? 1 : (cmd === "B") ? 0 : -1;

        if (color === -1) {
            addToQueue("INVALID COMMAND. ENTER R OR B:", "error-msg", true);
            return;
        }

        addToQueue("SCANNING FOR OPEN SESSIONS...", "system-msg");

        // STEP 3: Read first object in 'g' (numerical timestamp)
        db.ref('g').orderByKey().limitToFirst(1).once('value', snapshot => {
            let foundMatch = null;
            snapshot.forEach(child => {
                const data = child.val();
                // Check if the opposite slot is open
                if (color === 1 && data.bn && !data.rn) foundMatch = child.key;
                else if (color === 0 && data.rn && !data.bn) foundMatch = child.key;
            });

            if (foundMatch) joinExistingMatch(foundMatch, color, pass);
            else createNewMatch(color, pass);
        });
    }

    function createNewMatch(color, pass) {
        const tsKey = Date.now().toString(); // 13-digit Numerical Key
        const payload = { time: SERVER_TIMESTAMP, state: INIT_STATE };
        
        if (color === 1) { payload.rn = tempUser; payload.rp = pass; }
        else { payload.bn = tempUser; payload.bp = pass; }

        addToQueue("INITIALIZING NEW SESSION " + tsKey + "...", "system-msg");
        db.ref('g/' + tsKey).set(payload).then(() => {
            addToQueue("WAITING FOR OPPONENT...", "success-msg");
            // Placeholder for game listener
        }).catch(() => {
            addToQueue("MATCHMAKING ERROR. TRY AGAIN.", "error-msg");
            promptMode();
        });
    }

    function joinExistingMatch(id, color, pass) {
        const update = {};
        if (color === 1) { update.rn = tempUser; update.rp = pass; }
        else { update.bn = tempUser; update.bp = pass; }

        addToQueue("OPPONENT FOUND. SYNCING...", "system-msg");
        db.ref('g/' + id).update(update).then(() => {
            addToQueue("CONNECTED. STARTING GAME...", "success-msg");
            // Placeholder for game start
        }).catch(() => {
            addToQueue("SESSION COLLISION. RETRYING...", "error-msg");
            executeMatchmaking(color === 1 ? "R" : "B");
        });
    }

    function runJanitorSweep() {
        // Clean old accounts
        db.ref('a').once('value', snapshot => {
            const now = Date.now();
            snapshot.forEach(child => {
                if (now - child.val().lastplayed > 86400000) {
                    const u = child.key;
                    db.ref('s/' + u).remove();
                    db.ref('a/' + u).remove();
                }
            });
        });
        // Clean old games in 'g' (24 hour expiration)
        db.ref('g').once('value', snapshot => {
            const now = Date.now();
            snapshot.forEach(child => {
                const data = child.val();
                if (data.time && (now - data.time > 86400000)) child.ref.remove();
            });
        });
    }

    async function startTerminalWhenReady() {
        if (document.fonts) {
            try { await document.fonts.load('16px Unifont'); await document.fonts.ready; } catch (e) {}
        }
        initTerminalSequence();
    }

    function initTerminalSequence() {
        addToQueue("Laser Chess - Standard Version (Core Edition)", "highlight");
        addToQueue('Site for Laser Chess. <a href="https://www.youtube.com/watch?v=UqLa-LOficM&t=53s" class="rules-link" target="_blank">Rules</a>.', "system-msg");
        addToQueue("NOTICE: INACTIVE DATA PURGED EVERY 24 HOURS.", "highlight");

        const savedUser = localStorage.getItem('session_user');
        const savedPass = localStorage.getItem('session_pass');

        if (savedUser && savedPass) {
            addToQueue("RESTORING SESSION...", "system-msg");
            authenticateUser(savedUser, savedPass);
        } else {
            addToQueue("Session Username:", "", true);
        }
    }

    window.onload = startTerminalWhenReady;
</script>
</body>
</html>
