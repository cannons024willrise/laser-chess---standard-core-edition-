<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LASER CHESS STANDARD VARIANT (THINKFUN) - CORE EDITION (BETA η- Version)</title>
  <style>
    :root {
      --bg0: #0a0a0a;
      --bg1: #1a1a1a;
      --text: #b0b0b0;
      --bright: #ffffff;
      --error: #ff5555;
      --muted: #999999;
    }

    body {
      margin: 0;
      padding: 30px;
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 16px;
      line-height: 1.6;
      background: radial-gradient(circle at center, var(--bg1) 0%, var(--bg0) 100%);
      image-rendering: pixelated;
    }

    #terminal-log {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 1100px;
    }

    .history-line {
      min-height: 1.6em;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .input-wrapper {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-height: 1.6em;
    }

    .prompt {
      white-space: pre;
      flex: 0 0 auto;
    }

    .user-input-line {
      flex: 1 1 auto;
      min-width: 0;
      background: transparent;
      border: none;
      outline: none;
      color: var(--bright);
      font: inherit;
      caret-color: var(--bright);
      padding: 0;
      margin: 0;
    }

    .system-msg { color: var(--muted); }
    .success-msg { color: var(--bright); font-weight: 700; text-shadow: 0 0 5px rgba(255,255,255,0.85); }
    .error-msg { color: var(--error); }
    .highlight { color: var(--bright); font-weight: 700; }
  </style>
</head>
<body>
  <div id="terminal-log" aria-live="polite"></div>

  <script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-database-compat.js"></script>

  <script>
    (() => {
      'use strict';

      // --- FIREBASE CONFIGURATION ---
      const matchFirebaseConfig = {
        apiKey: "AIzaSyDv7keBI4B-TMp5hcVAYHeMfgWJdLHLJbE",
        authDomain: "laser-chess-low-efficiency.firebaseapp.com",
        databaseURL: "https://laser-chess-low-efficiency-default-rtdb.firebaseio.com",
        projectId: "laser-chess-low-efficiency"
      };

      const app = firebase.apps && firebase.apps.length
        ? firebase.app()
        : firebase.initializeApp(matchFirebaseConfig);
      const db = firebase.database(app);

      // --- STORAGE KEYS ---
      const KEY_USER = 'ls_user';
      const KEY_PASS = 'ls_pass';
      const KEY_REQUEST = 'ls_request';

      // --- UI ENGINE ---
      const log = document.getElementById('terminal-log');
      const queue = [];
      let processing = false;

      const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      function appendLine(className = '') {
        const div = document.createElement('div');
        div.className = `history-line ${className}`.trim();
        log.appendChild(div);
        return div;
      }

      function addToQueue(text, className = '', isRequest = false) {
        queue.push({ text, className, isRequest });
        if (!processing) processQueue();
      }

      async function processQueue() {
        processing = true;
        while (queue.length) {
          const item = queue.shift();
          if (item.isRequest) {
            await typeInputPrompt(item.text, item.className);
          } else {
            await typeTextLine(item.text, item.className);
          }
        }
        processing = false;
      }

      async function typeTextLine(text, className) {
        const line = appendLine(className);
        for (let i = 0; i < text.length; i++) {
          line.textContent += text[i];
          await sleep(12);
        }
      }

      function waitForEnter(input, onSubmit) {
        return new Promise((resolve) => {
          input.addEventListener('keydown', async (e) => {
            if (e.key !== 'Enter') return;
            e.preventDefault();
            const value = input.value.trim().toUpperCase();
            input.disabled = true;
            try {
              await onSubmit(value);
            } finally {
              resolve();
            }
          }, { once: true });
        });
      }

      async function typeInputPrompt(promptText, className) {
        const wrapper = document.createElement('div');
        wrapper.className = `input-wrapper history-line ${className}`.trim();

        const prompt = document.createElement('span');
        prompt.className = 'prompt';
        wrapper.appendChild(prompt);

        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'user-input-line';
        input.autocomplete = 'off';
        input.spellcheck = false;
        input.autocapitalize = 'characters';
        input.autocorrect = 'off';
        wrapper.appendChild(input);

        log.appendChild(wrapper);

        for (let i = 0; i < promptText.length; i++) {
          prompt.textContent += promptText[i];
          await sleep(12);
        }

        setTimeout(() => input.focus(), 0);
        await waitForEnter(input, handleAuth);
      }

      // --- AUTH & DATA LOGIC ---
      async function handleAuth(val) {
        const savedUser = localStorage.getItem(KEY_USER);
        const savedPass = localStorage.getItem(KEY_PASS);

        if (!savedUser) {
          if (!val) {
            addToQueue('USERNAME REQUIRED:', 'error-msg', true);
            return;
          }
          localStorage.setItem(KEY_USER, val);
          addToQueue(`USER SAVED: ${val}`, 'success-msg');
          await bootSequence();
          return;
        }

        if (!savedPass) {
          if (!val) {
            addToQueue('PASSKEY REQUIRED:', 'error-msg', true);
            return;
          }
          localStorage.setItem(KEY_PASS, val);
          addToQueue('PASSKEY SAVED.', 'success-msg');
          await bootSequence();
        }
      }

      async function checkExistingRequest() {
        const requestId = localStorage.getItem(KEY_REQUEST);

        addToQueue('================================', 'system-msg');
        addToQueue('REQUEST SESSION CHECK STARTED.', 'highlight');
        addToQueue('CHECKING MATCH DATABASE...', 'system-msg');

        try {
          if (requestId) {
            addToQueue(`SAVED REQUEST DETECTED: ${requestId}`, 'system-msg');
            addToQueue('QUERY MODE: DIRECT PATH', 'system-msg');

            const snap = await db.ref(`R/${requestId}`).once('value');
            if (snap.exists()) {
              addToQueue(`MATCH LINKED: ${requestId}`, 'success-msg');
              addToQueue('READ COMPLETE — ACTIVE REQUEST LOADED.', 'highlight');
            } else {
              addToQueue('SAVED REQUEST EXPIRED.', 'error-msg');
              localStorage.removeItem(KEY_REQUEST);
              addToQueue('RE-INITIALIZING QUEUE LOOKUP...', 'system-msg');
              return checkExistingRequest();
            }
          } else {
            addToQueue('NO SAVED REQUEST. SEEKING QUEUE HEAD...', 'system-msg');
            addToQueue('QUERY MODE: KEY_SORT + LIMIT_1', 'system-msg');

            const snap = await db.ref('R').orderByKey().limitToFirst(1).once('value');
            if (!snap.exists()) {
              addToQueue('NO ACTIVE REQUESTS FOUND.', 'system-msg');
              addToQueue('READY FOR MATCH CREATION.', 'highlight');
            } else {
              let firstKey = null;
              snap.forEach((child) => {
                firstKey = child.key;
              });
              if (firstKey) localStorage.setItem(KEY_REQUEST, firstKey);
              addToQueue(`NEW REQUEST ADOPTED: ${firstKey}`, 'success-msg');
              addToQueue('READ COMPLETE — ACTIVE REQUEST LOADED.', 'highlight');
            }
          }

          addToQueue('================================', 'system-msg');
        } catch (e) {
          console.error('Firebase Read Error:', e);
          addToQueue('CRITICAL: DATABASE ACCESS DENIED.', 'error-msg');
          addToQueue('CHECK SECURITY RULE INTEGRATION.', 'error-msg');
          addToQueue('================================', 'system-msg');
        }
      }

      async function bootSequence() {
        const user = localStorage.getItem(KEY_USER);
        const pass = localStorage.getItem(KEY_PASS);

        if (!user) {
          addToQueue('LASER CHESS STANDARD VARIANT(THINKFUN) - CORE EDITION(BETA η- Version) v1.0.6', 'highlight');
          addToQueue('IDENTIFY USER:', '', true);
          return;
        }

        if (!pass) {
          addToQueue(`WELCOME BACK, ${user}.`, 'highlight');
          addToQueue('ENTER PASSKEY:', '', true);
          return;
        }

        addToQueue('AUTH COMPLETE. GAME READY.', 'success-msg');
        await checkExistingRequest();
      }

      // --- INITIALIZE ---
      window.addEventListener('DOMContentLoaded', async () => {
        try {
          if (document.fonts?.load) {
            await document.fonts.load('16px ui-monospace');
            await document.fonts.ready;
          }
        } catch (e) {
          console.log('Font load issue:', e);
        }
        bootSequence();
      });
    })();
  </script>
</body>
</html>
