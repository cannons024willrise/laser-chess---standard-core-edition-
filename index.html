<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LASER CHESS STANDARD VARIANT(THINKFUN) - CORE EDITION(BETA η- Version)</title>
    <style>
        @font-face {
            font-family: 'Unifont';
            src: url('unifont-15.0.01.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: block;
        }

        body {
            background-color: #0a0a0a;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            color: #b0b0b0;
            font-family: 'Unifont', monospace;
            font-size: 16px;
            margin: 0;
            padding: 30px;
            line-height: 1.6;
            image-rendering: pixelated;
        }

        #terminal-log {
            display: flex;
            flex-direction: column;
        }

        .input-wrapper {
            display: flex;
            align-items: baseline;
            margin-top: 5px;
        }

        .user-input-line {
            background: transparent;
            border: none;
            color: #ffffff;
            font-family: 'Unifont', monospace;
            font-size: 16px;
            outline: none;
            flex-grow: 1;
            margin-left: 8px;
            caret-color: #ffffff;
        }

        .system-msg { color: #555; }
        .success-msg { color: #ffffff; font-weight: bold; text-shadow: 0 0 5px #fff; }
        .error-msg { color: #ff5555; }
        .highlight { color: #ffffff; font-weight: bold; }
        .history-line { margin-bottom: 4px; min-height: 1.6em; }
    </style>
</head>
<body>

<div id="terminal-log"></div>

<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-database-compat.js"></script>

<script>
    const WORKER_URL = "https://z9s73n03d0m.later5143.workers.dev/";

    const authFirebaseConfig = {
        apiKey: "AIzaSyBpOnnJInXkDPZ8hrKj-rpjw3qeTylxtw4",
        authDomain: "lasercheowefficiencymanager.firebaseapp.com",
        databaseURL: "https://lasercheowefficiencymanager-default-rtdb.firebaseio.com",
        projectId: "lasercheowefficiencymanager",
        storageBucket: "lasercheowefficiencymanager.firebasestorage.app",
        messagingSenderId: "28090691314",
        appId: "1:28090691314:web:e8c8ae5b0fd437038b6a6b",
        measurementId: "G-RXND7NVDHT"
    };

    const matchFirebaseConfig = {
        apiKey: "AIzaSyDv7keBI4B-TMp5hcVAYHeMfgWJdLHLJbE",
        authDomain: "laser-chess-low-efficiency.firebaseapp.com",
        databaseURL: "https://laser-chess-low-efficiency-default-rtdb.firebaseio.com",
        projectId: "laser-chess-low-efficiency",
        storageBucket: "laser-chess-low-efficiency.firebasestorage.app",
        messagingSenderId: "272182708734",
        appId: "1:272182708734:web:70460fb7f9c7ed9a7c98af",
        measurementId: "G-4HTGNQX3QC"
    };

    const authApp = firebase.initializeApp(authFirebaseConfig);
    const matchApp = firebase.initializeApp(matchFirebaseConfig, "matchDb");

    const authDb = firebase.database(authApp);
    const matchDb = firebase.database(matchApp);

    const log = document.getElementById('terminal-log');
    let msgQueue = [];
    let isProcessing = false;
    let authSignalSent = false;

    function addToQueue(text, className = "", isRequest = false) {
        msgQueue.push({ text, className, isRequest });
        if (!isProcessing) processQueue();
    }

    async function processQueue() {
        isProcessing = true;
        while (msgQueue.length > 0) {
            const item = msgQueue.shift();
            if (item.isRequest) await typeLineInline(item.text, item.className);
            else await typeLineSimple(item.text, item.className);
        }
        isProcessing = false;
    }

    function typeLineSimple(text, className) {
        return new Promise((resolve) => {
            const div = document.createElement('div');
            div.className = "history-line " + className;
            log.appendChild(div);

            let i = 0;
            const timer = setInterval(() => {
                if (i < text.length) {
                    div.textContent += text.charAt(i++);
                } else {
                    clearInterval(timer);
                    resolve();
                }
            }, 12);
        });
    }

    function typeLineInline(text, className) {
        return new Promise((resolve) => {
            const wrapper = document.createElement('div');
            wrapper.className = "input-wrapper history-line " + className;
            wrapper.innerHTML = `<span></span><input type="text" class="user-input-line" autocomplete="off">`;
            log.appendChild(wrapper);

            const label = wrapper.querySelector('span');
            const input = wrapper.querySelector('input');

            let i = 0;
            const timer = setInterval(() => {
                if (i < text.length) {
                    label.textContent += text.charAt(i++);
                } else {
                    clearInterval(timer);
                    input.focus();

                    input.onkeydown = (e) => {
                        if (e.key === 'Enter') {
                            const val = input.value.trim().toUpperCase();
                            input.disabled = true;
                            handleAuth(val);
                            resolve();
                        }
                    };
                }
            }, 12);
        });
    }

    async function triggerWorkerAuth() {
        if (authSignalSent) return;
        authSignalSent = true;

        const payload = {
            type: "AUTH",
            action: "AUTH_CHECK",
            user: localStorage.getItem('ls_user'),
            pass: localStorage.getItem('ls_pass'),
            ts: Date.now()
        };

        try {
            await fetch(WORKER_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });
        } catch (e) {
            console.log("Worker signal failed:", e);
        }
    }

    async function checkExistingMatch() {
        const matchId = localStorage.getItem('ls_match');
        if (!matchId) return false;

        addToQueue("RESUMING MATCH STATE...", "system-msg");

        try {
            const snap = await matchDb.ref(matchId).once('value');
            const data = snap.val();

            if (data) {
                addToQueue(`MATCH RESUMED: ${matchId}`, "success-msg");
                return true;
            } else {
                addToQueue("MATCH NOT FOUND. CLEARING STATE.", "error-msg");
                localStorage.removeItem('ls_match');
                return false;
            }
        } catch (e) {
            console.log("Match read failed:", e);
            addToQueue("MATCH READ FAILED.", "error-msg");
            return false;
        }
    }

    function handleAuth(val) {
        const u = localStorage.getItem('ls_user');

        if (!u) {
            if (!val) {
                addToQueue("USERNAME REQUIRED:", "error-msg", true);
                return;
            }
            localStorage.setItem('ls_user', val);
            bootSequence();
        } else {
            const p = localStorage.getItem('ls_pass');

            if (!p) {
                if (!val) {
                    addToQueue("PASSKEY REQUIRED:", "error-msg", true);
                    return;
                }
                localStorage.setItem('ls_pass', val);
                bootSequence();
            }
        }
    }

    async function bootSequence() {
        const u = localStorage.getItem('ls_user');
        const p = localStorage.getItem('ls_pass');
        const m = localStorage.getItem('ls_match');

        if (!u) {
            addToQueue("LASER CHESS STANDARD VARIANT(THINKFUN) - CORE EDITION(BETA η- Version)  v1.0.6", "highlight");
            addToQueue("IDENTIFY USER:", "", true);
            return;
        }

        if (!p) {
            addToQueue(`WELCOME BACK, ${u}.`, "highlight");
            addToQueue("ENTER PASSKEY:", "", true);
            return;
        }

        addToQueue("AUTH COMPLETE. GAME READY.", "success-msg");

        if (m) {
            await checkExistingMatch();
            return;
        }

        await triggerWorkerAuth();
    }

    bootSequence();
</script>

</body>
</html>
