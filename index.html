<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LASER CHESS STANDARD VARIANT (THINKFUN) - CORE EDITION (BETA η- Version)</title>

  <style>
    @font-face {
      font-family: 'Unifont';
      src: url('unifont-15.0.01.ttf') format('truetype');
    }

    :root {
      --bg0: #0a0a0a;
      --bg1: #1a1a1a;
      --text: #b0b0b0;
      --bright: #ffffff;
      --error: #ff5555;
      --muted: #999999;
      --waiting: #00ff00;
    }

    body {
      margin: 0;
      padding: 30px;
      color: var(--text);
      font-family: 'Unifont', monospace;
      background: radial-gradient(circle at center, var(--bg1), var(--bg0));
    }

    #terminal-log {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 1100px;
    }

    .history-line { white-space: pre-wrap; }
    .input-wrapper { display:flex; gap:8px; }
    .prompt { white-space: pre; }

    .user-input-line {
      flex:1;
      background: transparent;
      border: none;
      color: var(--bright);
      font: inherit;
      outline: none;
    }

    .system-msg { color: var(--muted); }
    .success-msg { color: var(--bright); font-weight: 700; }
    .error-msg { color: var(--error); }
    .highlight { color: var(--bright); font-weight: 700; }
    .wait-msg { color: var(--waiting); }
  </style>
</head>

<body>
<div id="terminal-log"></div>

<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-database-compat.js"></script>

<script>
(() => {
  'use strict';

  const matchFirebaseConfig = {
    apiKey: "AIzaSyBpOnnJInXkDPZ8hrKj-rpjw3qeTylxtw4",
    authDomain: "lasercheowefficiencymanager.firebaseapp.com",
    databaseURL: "https://lasercheowefficiencymanager-default-rtdb.firebaseio.com",
    projectId: "lasercheowefficiencymanager",
    storageBucket: "lasercheowefficiencymanager.firebasestorage.app",
    messagingSenderId: "28090691314",
    appId: "1:28090691314:web:e8c8ae5b0fd437038b6a6b"
  };

  const WORKER_URL = 'https://laserchessmatchmanager.later5143.workers.dev/';

  const app = firebase.apps?.length ? firebase.app() : firebase.initializeApp(matchFirebaseConfig);
  const db = firebase.database(app);

  const KEY_USER = 'ls_user';
  const KEY_PASS = 'ls_pass';
  const KEY_RID  = 'ls_request_id';

  const logContainer = document.getElementById('terminal-log');
  const queue = [];
  let processing = false;
  let currentPromptWrap = null;
  let lockedMatchId = null;
  let rqPollInterval = null;
  let waitAnimationInterval = null;

  const sleep = ms => new Promise(r => setTimeout(r, ms));

  function createLine(cls='') {
    const d = document.createElement('div');
    d.className = `history-line ${cls}`;
    if (currentPromptWrap) {
      logContainer.insertBefore(d, currentPromptWrap);
    } else {
      logContainer.appendChild(d);
    }
    return d;
  }

  // UPDATED: Logs bypass the queue lock to prevent blocking during prompts
  function add(text, cls='', req=false, handler=null) {
    if (!req && processing) {
      type(text, cls, true); // Immediate type for logs
      return;
    }
    queue.push({text,cls,req,handler});
    if (!processing) run();
  }

  async function run() {
    processing = true;
    while(queue.length) {
      const i = queue.shift();
      if (i.req) await prompt(i.text, i.cls, i.handler || handleAuth);
      else await type(i.text, i.cls);
    }
    processing = false;
  }

  async function type(text, cls, immediate=false) {
    const l = createLine(cls);
    if (immediate) {
      l.textContent = text;
      return l;
    }
    for (const c of text) {
      l.textContent += c;
      await sleep(10);
    }
    return l;
  }

  async function prompt(text, cls, handler) {
    const wrap = document.createElement('div');
    wrap.className = 'input-wrapper history-line';
    const p = document.createElement('span');
    p.className = 'prompt';
    wrap.appendChild(p);
    const input = document.createElement('input');
    input.className = 'user-input-line';
    wrap.appendChild(input);
    
    logContainer.appendChild(wrap);
    currentPromptWrap = wrap;

    for (const c of text) {
      p.textContent += c;
      await sleep(8);
    }
    
    setTimeout(() => input.focus(), 0);
    
    return new Promise(resolve => {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          const v = input.value.trim().toUpperCase();
          input.disabled = true;
          const finalLine = createLine('highlight');
          finalLine.textContent = p.textContent + v;
          wrap.remove();
          currentPromptWrap = null;
          handler(v);
          resolve();
        }
      });
    });
  }

  // --- POLLING LOGIC ---
  async function pollFirstMatch() {
    try {
      const snapshot = await db.ref('/RQ').orderByKey().limitToFirst(1).once('value');
      const data = snapshot.val();
      if (!data) {
          add('RQ Buffer: Empty', 'system-msg');
          return;
      }

      const keys = Object.keys(data);
      if (keys.length > 0) {
        const firstKey = keys[0];
        add(`[QUEUE] Head: ${firstKey} | User: ${data[firstKey].username}`, 'success-msg');
      }
    } catch (e) {
      add('Err: RQ Access Denied.', 'error-msg');
    }
  }

  function startPolling() {
    if (rqPollInterval) clearInterval(rqPollInterval);
    add('Starting Queue Watcher...', 'system-msg');
    pollFirstMatch(); 
    rqPollInterval = setInterval(pollFirstMatch, 5000);
  }

  function stopPolling() {
    if (rqPollInterval) {
      clearInterval(rqPollInterval);
      rqPollInterval = null;
      add('Queue Watcher Offline.', 'system-msg');
    }
  }

  // --- WAITING STATUS ---
  function toggleWaiting(active) {
    if (active) {
      if (waitAnimationInterval) return;
      const l = createLine('wait-msg');
      let dots = 0;
      waitAnimationInterval = setInterval(() => {
        dots = (dots + 1) % 4;
        l.textContent = "Waiting for match acknowledgement" + ".".repeat(dots);
      }, 500);
    } else {
      clearInterval(waitAnimationInterval);
      waitAnimationInterval = null;
    }
  }

  // --- MATCH SYSTEM ---
  function startMatchListener() {
    const savedRid = localStorage.getItem(KEY_RID);
    if (!savedRid) return;

    toggleWaiting(true);
    const ref = db.ref(`/R/${savedRid}`);
    ref.on('value', snap => {
      const data = snap.val();
      if (!data) return;
      
      // If we found the match data, stop waiting and lock
      if (lockedMatchId !== savedRid) {
        toggleWaiting(false);
        lockOntoMatch(savedRid, data, true);
      }
    });
  }

  function lockOntoMatch(id, entry, isRecovery = false) {
    lockedMatchId = id;
    localStorage.setItem(KEY_RID, id); 
    stopPolling(); 

    add(isRecovery ? `SESSION RESTORED: ${id}` : `MATCH ESTABLISHED: ${id}`, 'success-msg');
    add(`HARD-LOCK ACTIVE: ${entry.username}`, 'highlight');
    add(`Color Assigned: ${entry.color === 0 ? 'RED' : 'BLUE'}`, 'system-msg');
  }

  function showMode() {
    if (localStorage.getItem(KEY_RID)) return; 
    add('Select sequence: [PR] Red | [PB] Blue', 'system-msg');
    add('MODE:', '', true, handleMode);
  }

  async function handleMode(val) {
    if (localStorage.getItem(KEY_RID)) return;

    if (!val || !['PR','PB','R','B'].includes(val)) {
      add('Invalid input.', 'error-msg');
      return showMode();
    }

    const username = localStorage.getItem(KEY_USER) || '';
    const color = (val === 'PR' || val === 'R') ? 0 : 1;
    
    add('Registering with Worker...', 'system-msg');

    try {
      const res = await fetch(WORKER_URL, {
        method:'POST',
        headers:{'Content-Type':'text/plain'},
        body: JSON.stringify({ username, color, lastActivity: Date.now() })
      });

      const data = await res.json();
      if (data.timestamp) {
        localStorage.setItem(KEY_RID, data.timestamp); 
        add(`Registered ID: ${data.timestamp}`, 'success-msg');
        stopPolling();
        startMatchListener(); 
      }
    } catch {
      add('Worker sync failed.', 'error-msg');
    }
  }

  async function handleAuth(v) {
    const u = localStorage.getItem(KEY_USER);
    const p = localStorage.getItem(KEY_PASS);

    if (!u) {
      if (!v) return add('User ID:', '', true, handleAuth);
      localStorage.setItem(KEY_USER, v);
      return boot();
    }
    if (!p) {
      if (!v) return add('Access Key:', '', true, handleAuth);
      localStorage.setItem(KEY_PASS, v);
      return boot();
    }
  }

  async function boot() {
    const u = localStorage.getItem(KEY_USER);
    const p = localStorage.getItem(KEY_PASS);
    const rid = localStorage.getItem(KEY_RID);

    if (!u) return add('TERMINAL ACCESS: LOGIN REQUIRED', 'system-msg'), add('User ID:', '', true, handleAuth);
    if (!p) return add(`Identity: ${u}`, 'highlight'), add('Access Key:', '', true, handleAuth);

    add('Core Protocol: Online.', 'success-msg');

    if (rid) {
      add(`Existing Lock Detected: ${rid}`, 'success-msg');
      startMatchListener();
    } else {
      startPolling();
      showMode();
    }
  }

  window.addEventListener('DOMContentLoaded', boot);
})();
</script>
</body>
</html>
