<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Laser Chess - Core Edition</title>
    <style>
        @font-face {
            font-family: 'Unifont';
            /* Ensure the filename matches exactly what is in your directory */
            src: url('unifont-15.0.01.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: block;
        }

        body {
            background-color: #0a0a0a;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            color: #b0b0b0; 
            font-family: 'Unifont', monospace;
            font-size: 16px; 
            margin: 0; padding: 30px; 
            line-height: 1.6;
            /* Ensures crisp pixel edges for the terminal look */
            image-rendering: pixelated;
        }

        #terminal-log { display: flex; flex-direction: column; }
        .input-wrapper { display: flex; align-items: baseline; margin-top: 5px; }
        
        .user-input-line {
            background: transparent; border: none; color: #ffffff;
            font-family: 'Unifont', monospace; font-size: 16px;
            outline: none; flex-grow: 1; margin-left: 8px; caret-color: #ffffff;
        }

        .system-msg { color: #555; }
        .success-msg { color: #ffffff; font-weight: bold; text-shadow: 0 0 5px #fff; }
        .error-msg { color: #ff5555; }
        .highlight { color: #ffffff; font-weight: bold; }
        .history-line { margin-bottom: 4px; min-height: 1.6em; }
    </style>
</head>
<body>

<div id="terminal-log"></div>

<script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBuT7P1iTdXcZW-y05DX-kseuLrPGmaWSs",
        authDomain: "laserchess-web-free.firebaseapp.com",
        databaseURL: "https://laserchess-web-free-default-rtdb.firebaseio.com",
        projectId: "laserchess-web-free"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const log = document.getElementById('terminal-log');
    let msgQueue = [];
    let isProcessing = false;
    let activeQueueMatch = null;
    let currentLobbySub = null;

    // --- TYPEWRITER ENGINE ---
    function addToQueue(text, className = "", isRequest = false) {
        msgQueue.push({ text, className, isRequest });
        if (!isProcessing) processQueue();
    }

    async function processQueue() {
        isProcessing = true;
        while (msgQueue.length > 0) {
            const item = msgQueue.shift();
            if (item.isRequest) await typeLineInline(item.text, item.className);
            else await typeLineSimple(item.text, item.className);
        }
        isProcessing = false;
    }

    function typeLineSimple(text, className) {
        return new Promise((resolve) => {
            const div = document.createElement('div');
            div.className = "history-line " + className;
            log.appendChild(div);
            let i = 0;
            const timer = setInterval(() => {
                if (i < text.length) {
                    div.textContent += text.charAt(i);
                    i++;
                    window.scrollTo(0, document.body.scrollHeight);
                } else {
                    clearInterval(timer);
                    resolve();
                }
            }, 12);
        });
    }

    function typeLineInline(text, className) {
        return new Promise((resolve) => {
            const wrapper = document.createElement('div');
            wrapper.className = "input-wrapper history-line " + className;
            wrapper.innerHTML = `<span></span><input type="text" class="user-input-line" disabled autocomplete="off">`;
            log.appendChild(wrapper);
            const label = wrapper.querySelector('span');
            const input = wrapper.querySelector('input');
            
            let i = 0;
            const timer = setInterval(() => {
                if (i < text.length) {
                    label.textContent += text.charAt(i);
                    i++;
                } else {
                    clearInterval(timer);
                    input.disabled = false;
                    input.focus();
                    input.onkeydown = (e) => {
                        if (e.key === 'Enter') {
                            const val = input.value.trim().toUpperCase();
                            input.disabled = true;
                            handleGlobalLogic(val);
                            resolve();
                        }
                    };
                }
            }, 12);
        });
    }

    // --- CORE LOGIC ---
    function handleGlobalLogic(val) {
        const u = localStorage.getItem('ls_user');
        const p = localStorage.getItem('ls_pass');

        if (!u) {
            if(!val) { addToQueue("USERNAME REQUIRED:", "error-msg", true); return; }
            localStorage.setItem('ls_user', val);
            bootSequence();
        } else if (!p) {
            if(!val) { addToQueue("PASSKEY REQUIRED:", "error-msg", true); return; }
            localStorage.setItem('ls_pass', val);
            startLobbySync();
        } else {
            executeMatchAction(val);
        }
    }

    function startLobbySync() {
        if (currentLobbySub) db.ref('fifo_enforcer').off('value', currentLobbySub);

        currentLobbySub = db.ref('fifo_enforcer').orderByKey().limitToFirst(1).on('value', snap => {
            if (snap.exists()) {
                let mId, et;
                snap.forEach(c => { mId = c.key; et = c.val().et; });
                db.ref(`matches/${mId}/public_data`).once('value', pSnap => {
                    activeQueueMatch = { id: mId, et: et, data: pSnap.val() };
                    renderLobby();
                });
            } else {
                activeQueueMatch = null;
                renderLobby();
            }
        });
    }

    function renderLobby() {
        if (isProcessing && msgQueue.length > 0) return; // Wait for current sequence
        addToQueue("--- LOBBY READ SUCCESSFUL ---", "system-msg");
        if (activeQueueMatch) {
            const side = activeQueueMatch.data.rn ? "RED" : "BLUE";
            addToQueue(`MATCH DETECTED: ${activeQueueMatch.id} [${side} OCCUPIED]`, "highlight");
            addToQueue("[A] JOIN OPPOSITE | [R] NEW RED | [B] NEW BLUE", "system-msg");
        } else {
            addToQueue("QUEUE STATUS: EMPTY.", "system-msg");
            addToQueue("[R] CREATE RED | [B] CREATE BLUE", "system-msg");
        }
        addToQueue("COMMAND>", "", true);
    }

    function executeMatchAction(cmd) {
        const u = localStorage.getItem('ls_user');
        const p = localStorage.getItem('ls_pass');

        if (cmd === "R") {
            // THE LOCK: BLOCK RED IF RED IS AT TOP
            if (activeQueueMatch?.data?.rn) {
                addToQueue("ACCESS DENIED: RED SLOT TAKEN AT QUEUE HEAD. JOIN BLUE [A].", "error-msg");
                renderLobby();
            } else create(1, u, p);
        } else if (cmd === "B") {
            // THE LOCK: BLOCK BLUE IF BLUE IS AT TOP
            if (activeQueueMatch?.data?.bn) {
                addToQueue("ACCESS DENIED: BLUE SLOT TAKEN AT QUEUE HEAD. JOIN RED [A].", "error-msg");
                renderLobby();
            } else create(0, u, p);
        } else if (cmd === "A" && activeQueueMatch) {
            join(activeQueueMatch.data.rn ? 0 : 1, u, p);
        } else {
            addToQueue("ERR: INVALID COMMAND.", "error-msg");
            renderLobby();
        }
    }

    function create(col, u, p) {
        const id = Date.now().toString();
        const et = Math.floor(Math.random() * 900000 + 100000).toString();
        const upd = {};
        upd[`fifo_enforcer/${id}/et`] = et;
        upd[`matches/${id}/public_data/${col ? 'rn' : 'bn'}`] = u;
        upd[`matches/${id}/private_tokens/et`] = et;
        upd[`matches/${id}/private_tokens/${col ? 'redpassword' : 'bluepassword'}`] = p;
        
        db.ref().update(upd).then(() => {
            addToQueue(`SUCCESS: MATCH ${id} INITIALIZED.`, "success-msg");
        });
    }

    function join(col, u, p) {
        const upd = {};
        upd[`fifo_enforcer/${activeQueueMatch.id}`] = null;
        upd[`matches/${activeQueueMatch.id}/public_data/${col ? 'rn' : 'bn'}`] = u;
        upd[`matches/${activeQueueMatch.id}/private_tokens/et`] = activeQueueMatch.et;
        upd[`matches/${activeQueueMatch.id}/private_tokens/${col ? 'redpassword' : 'bluepassword'}`] = p;
        
        db.ref().update(upd).then(() => {
            addToQueue("HANDSHAKE COMPLETE. REDIRECTING...", "success-msg");
        });
    }

    async function bootSequence() {
        // Wait for font load to prevent blank screen or layout shift
        if (document.fonts) {
            try { await document.fonts.load('16px Unifont'); } catch(e) { console.log("Font failed"); }
        }

        const u = localStorage.getItem('ls_user');
        const p = localStorage.getItem('ls_pass');
        
        if (!u) {
            addToQueue("LASER CHESS CORE TERMINAL v1.0.6", "highlight");
            addToQueue("IDENTIFY USER:", "", true);
        } else if (!p) {
            addToQueue(`WELCOME BACK, ${u}.`, "highlight");
            addToQueue("ENTER PASSKEY:", "", true);
        } else {
            startLobbySync();
        }
    }

    bootSequence();
</script>
</body>
</html>
