<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Khet 2.0 - 10x8 Render</title>
    <style>
        body { background: #050505; color: #eee; font-family: monospace; display: flex; flex-direction: column; align-items: center; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(10, 40px); 
            grid-template-rows: repeat(8, 40px); 
            gap: 2px; border: 4px solid #333; padding: 5px; background: #222;
        }
        .cell { 
            width: 40px; height: 40px; background: #111; 
            display: flex; align-items: center; justify-content: center; font-size: 22px; 
        }
        .silver { color: #00d4ff; text-shadow: 0 0 8px #00d4ff; } /* Player 0 */
        .red { color: #ff3333; text-shadow: 0 0 8px #ff3333; }    /* Player 1 */
        .empty { color: #444; font-size: 12px; }
        .info { margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="info">
        <h2>KHET 2.0 BOARD STATE</h2>
        <p>157 Digits Processed | Grid: 10x8 | Turn: <span id="turn"></span></p>
    </div>
    <div id="board" class="grid"></div>

<script>
    const state = "0147010250010397110400410543210644110753110854210937111040411157111260411332111421411523411603211724111804311993112073312194412274212367212421312529112670410";
    
    // Symbols based on piece ID ranges
    const getSymbol = (id, rot) => {
        const r = rot % 4;
        if (id <= 2) return "♔"; // Pharaoh
        if (id <= 4) return ["^", ">", "v", "<"][r]; // Sphinx
        if (id <= 8) return ["⬒", "◨", "⬓", "◧"][r]; // Scarab
        if (id <= 12) return ["▲", "▶", "▼", "◀"][r]; // Anubis
        return ["◤", "◥", "◢", "◣"][r]; // Pyramid
    };

    const boardEl = document.getElementById('board');
    const turnEl = document.getElementById('turn');
    
    // Last digit is the turn
    const turnDigit = state.slice(-1);
    turnEl.innerText = turnDigit === "0" ? "SILVER" : "RED";
    turnEl.className = turnDigit === "0" ? "silver" : "red";

    const cells = Array(8).fill(0).map(() => Array(10).fill(null));

    // Parse pieces (26 pieces, 6 digits each)
    for (let i = 0; i < 26; i++) {
        const p = state.substr(i * 6, 6);
        const id = parseInt(p.substr(0, 2));
        const x = parseInt(p.substr(2, 1));
        const y = parseInt(p.substr(3, 1));
        const rot = parseInt(p.substr(4, 1));
        const owner = parseInt(p.substr(5, 1));
        
        if (y < 8 && x < 10) {
            cells[y][x] = { symbol: getSymbol(id, rot), owner };
        }
    }

    // Render (Rows 7 down to 0)
    for (let y = 7; y >= 0; y--) {
        for (let x = 0; x < 10; x++) {
            const div = document.createElement('div');
            div.className = 'cell';
            if (cells[y][x]) {
                div.innerHTML = `<span class="${cells[y][x].owner === 0 ? 'silver' : 'red'}">${cells[y][x].symbol}</span>`;
            } else {
                div.innerHTML = `<span class="empty">·</span>`;
            }
            boardEl.appendChild(div);
        }
    }
</script>
</body>
</html>
