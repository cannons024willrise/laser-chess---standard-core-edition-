<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Laser Chess - Standard Version (Core Edition)</title>
    <style>
        @font-face {
            font-family: 'Unifont';
            src: url('unifont-15.0.01.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            color: #b0b0b0; 
            font-family: 'Unifont', monospace;
            font-size: 16px;
            image-rendering: pixelated;
            -webkit-font-smoothing: none;
            margin: 0;
            padding: 30px;
            overflow-x: hidden;
            background-attachment: fixed;
        }

        #terminal-log {
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
        }

        .input-wrapper {
            display: flex;
            align-items: baseline;
            width: 100%;
            margin-top: 2px;
            margin-bottom: 5px;
        }

        .user-input-line {
            background: transparent;
            border: none;
            color: #00ff00;
            font-family: 'Unifont', monospace;
            font-size: 16px;
            outline: none;
            flex-grow: 1;
            margin-left: 8px;
            padding: 0;
            caret-color: #00ff00;
        }

        .txt-red { color: #ff4444; font-weight: bold; }
        .txt-blue { color: #4444ff; font-weight: bold; }
        .system-msg { color: #555555; display: block; margin-bottom: 5px; }
        .success-msg { color: #00ff00; font-weight: bold; display: block; margin-bottom: 5px; }
        .error-msg { color: #ff5555; display: block; margin-bottom: 5px; }
        .highlight { color: #ffffff; display: block; margin-bottom: 5px; }
        .history-line { display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="terminal-log"></div>

<script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBuT7P1iTdXcZW-y05DX-kseuLrPGmaWSs",
        authDomain: "laserchess-web-free.firebaseapp.com",
        databaseURL: "https://laserchess-web-free-default-rtdb.firebaseio.com",
        projectId: "laserchess-web-free",
        storageBucket: "laserchess-web-free.firebasestorage.app",
        messagingSenderId: "887464510754",
        appId: "1:887464510754:web:aee6938681543602a4517b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const log = document.getElementById('terminal-log');
    let msgQueue = [];
    let isProcessing = false;
    let currentState = "USERNAME";
    let tempUser = "";
    let tempMode = "";

    function colorize(text) {
        return text.replace(/(red|blue)/gi, (match) => {
            const cls = match.toLowerCase() === 'red' ? 'txt-red' : 'txt-blue';
            return `<span class="${cls}">${match}</span>`;
        });
    }

    function addToQueue(text, className = "", isRequest = false) {
        msgQueue.push({ text, className, isRequest });
        if (!isProcessing) processQueue();
    }

    async function processQueue() {
        isProcessing = true;
        while (msgQueue.length > 0) {
            const item = msgQueue.shift();
            if (item.isRequest) {
                await typeLineInline(item.text, item.className);
            } else {
                await typeLineSimple(item.text, item.className);
            }
        }
        isProcessing = false;
    }

    function typeLineSimple(text, className) {
        return new Promise((resolve) => {
            const div = document.createElement('div');
            div.className = className + " history-line";
            log.appendChild(div);
            let i = 0;
            const timer = setInterval(() => {
                if (i < text.length) {
                    div.textContent += text.charAt(i);
                    i++;
                } else {
                    clearInterval(timer);
                    div.innerHTML = colorize(div.textContent);
                    window.scrollTo(0, document.body.scrollHeight);
                    resolve();
                }
            }, 15);
        });
    }

    function typeLineInline(text, className) {
        return new Promise((resolve) => {
            const wrapper = document.createElement('div');
            wrapper.className = "input-wrapper history-line " + className;
            const label = document.createElement('span');
            wrapper.appendChild(label);
            const input = document.createElement('input');
            input.type = "text";
            input.className = "user-input-line";
            input.autocomplete = "off";
            input.spellcheck = false;
            input.disabled = true; 
            wrapper.appendChild(input);
            log.appendChild(wrapper);

            let i = 0;
            const timer = setInterval(() => {
                if (i < text.length) {
                    label.textContent += text.charAt(i);
                    i++;
                } else {
                    clearInterval(timer);
                    label.innerHTML = colorize(label.textContent);
                    input.disabled = false;
                    input.focus();
                    window.scrollTo(0, document.body.scrollHeight);
                    const handleEnter = (e) => {
                        if (e.key === 'Enter') {
                            const val = input.value.trim();
                            input.disabled = true;
                            input.removeEventListener('keydown', handleEnter);
                            handleStateLogic(val);
                            resolve();
                        }
                    };
                    input.addEventListener('keydown', handleEnter);
                }
            }, 20);
        });
    }

    function handleStateLogic(val) {
        switch(currentState) {
            case "USERNAME":
                tempUser = val;
                currentState = "PASSWORD";
                addToQueue("Session Password:", "", true);
                break;
            case "PASSWORD":
                localStorage.setItem('session_user', tempUser);
                localStorage.setItem('session_pass', val);
                addToQueue("Local Session established.", "success-msg");
                addToQueue("R: Public Red  | B: Public Blue");
                addToQueue("P: Private Session (UUID)");
                addToQueue("Choose Mode:", "", true);
                currentState = "MODE_SELECT";
                break;
            case "MODE_SELECT":
                tempMode = val.toUpperCase();
                if (tempMode === "R" || tempMode === "B") {
                    submitLobbyRequest(tempMode.toLowerCase());
                } else if (tempMode === "P") {
                    currentState = "UUID_INPUT";
                    addToQueue("Enter 24H Game UUID:", "", true);
                } else {
                    addToQueue("INVALID MODE. R/B/P ONLY.", "error-msg");
                    addToQueue("Choose Mode:", "", true);
                }
                break;
            case "UUID_INPUT":
                performHandshake(val);
                break;
        }
    }

    function submitLobbyRequest(colorCode) {
        const timestamp = Date.now();
        const u = localStorage.getItem('session_user');
        const p = localStorage.getItem('session_pass');
        
        addToQueue(`TRANSMITTING LOBBY REQUEST [${colorCode.toUpperCase()}]...`, "system-msg");
        
        // Keys: 0=Color, 1=User, 2=Pass
        db.ref('requests/' + timestamp).set({
            "0": colorCode,
            "1": u,
            "2": p
        }).then(() => {
            addToQueue("REQUEST QUEUED. Awaiting peer...", "success-msg");
        }).catch(err => {
            addToQueue("DENIED: IDENTITY COLLISION OR TIMEOUT.", "error-msg");
            addToQueue("Choose Mode:", "", true);
            currentState = "MODE_SELECT";
        });
    }

    function performHandshake(uuid) {
        // Red is R (Public) or PR (Private)
        const isRed = (tempMode === 'R' || tempMode === 'PR');
        const userKey = isRed ? '1' : '3';
        const passKey = isRed ? '2' : '4';

        addToQueue(`CONNECTING TO NODE ${uuid}...`, "system-msg");

        db.ref('games/' + uuid).once('value').then(snap => {
            if (snap.exists()) {
                const data = snap.val();
                if (data[passKey] === localStorage.getItem('session_pass') && data[userKey] === localStorage.getItem('session_user')) {
                    addToQueue("HANDSHAKE SUCCESSFUL.", "success-msg");
                    addToQueue("STATE_HEX: " + data['0'].substring(0, 48) + "...", "highlight");
                } else {
                    addToQueue("DENIED: AUTH MISMATCH.", "error-msg");
                    addToQueue("Enter 24H Game UUID:", "", true);
                }
            } else {
                addToQueue("ERROR: INVALID UUID.", "error-msg");
                addToQueue("Enter 24H Game UUID:", "", true);
            }
        });
    }

    window.onload = () => {
        addToQueue("Laser Chess - Standard Version (Core Edition)", "highlight");
        addToQueue("Initializing terminal instance...", "system-msg");
        addToQueue("Session Username:", "", true);
    };
</script>
</body>
</html>
