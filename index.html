<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LASER CHESS STANDARD VARIANT - CORE EDITION (BETA η)</title>

  <style>
    @font-face { font-family: 'Unifont'; src: url('unifont-15.0.01.ttf') format('truetype'); }

    :root {
      --bg0: #0a0a0a;
      --bg1: #1a1a1a;
      --text: #b0b0b0;
      --bright: #ffffff;
      --error: #ff5555;
      --muted: #999999;
      --waiting: #00ff00;
    }

    body {
      margin: 0;
      padding: 30px;
      color: var(--text);
      font-family: 'Unifont', monospace;
      background: radial-gradient(circle at center, var(--bg1), var(--bg0));
    }

    #terminal-log {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 1100px;
    }

    .history-line { white-space: pre-wrap; word-break: break-all; }
    .input-wrapper { display:flex; gap:8px; }
    .prompt { white-space: pre; }

    .user-input-line {
      flex:1;
      background: transparent;
      border: none;
      color: var(--bright);
      font: inherit;
      outline: none;
    }

    .system-msg { color: var(--muted); }
    .success-msg { color: var(--bright); font-weight: 700; }
    .error-msg { color: var(--error); }
    .highlight { color: var(--bright); font-weight: 700; }
    .wait-msg { color: var(--waiting); }
  </style>
</head>

<body>
<div id="terminal-log"></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-database-compat.js"></script>

<script>
(() => {
  'use strict';

  // --- CONFIGURATION ---
  const matchFirebaseConfig = {
    apiKey: "AIzaSyBpOnnJInXkDPZ8hrKj-rpjw3qeTylxtw4",
    authDomain: "lasercheowefficiencymanager.firebaseapp.com",
    databaseURL: "https://lasercheowefficiencymanager-default-rtdb.firebaseio.com",
    projectId: "lasercheowefficiencymanager",
    storageBucket: "lasercheowefficiencymanager.firebasestorage.app",
    messagingSenderId: "28090691314",
    appId: "1:28090691314:web:e8c8ae5b0fd437038b6a6b"
  };

  const WORKER_URL = 'https://laserchessmatchmanager.later5143.workers.dev/';
  const app = firebase.apps?.length ? firebase.app() : firebase.initializeApp(matchFirebaseConfig);
  const db = firebase.database(app);

  const KEY_USER = 'ls_user', KEY_PASS = 'ls_pass', KEY_RID = 'ls_request_id';

  const logContainer = document.getElementById('terminal-log');
  const queue = [];
  let processing = false, currentPromptWrap = null, lockedMatchId = null;
  let rqPollInterval = null, waitAnimationInterval = null, lastQueueState = 'INIT';
  let currentHead = null; 

  const sleep = ms => new Promise(r => setTimeout(r, ms));

  // --- UI CORE ---
  function createLine(cls='') {
    const d = document.createElement('div');
    d.className = `history-line ${cls}`;
    if (currentPromptWrap) logContainer.insertBefore(d, currentPromptWrap);
    else logContainer.appendChild(d);
    return d;
  }

  function add(text, cls='', req=false, handler=null) {
    if (!req && processing) { type(text, cls, true); return; }
    queue.push({text,cls,req,handler});
    if (!processing) run();
  }

  async function run() {
    processing = true;
    while(queue.length) {
      const i = queue.shift();
      if (i.req) await prompt(i.text, i.cls, i.handler || handleAuth);
      else await type(i.text, i.cls);
    }
    processing = false;
  }

  async function type(text, cls, immediate=false) {
    const l = createLine(cls);
    if (immediate) { l.textContent = text; return l; }
    for (const c of text) { l.textContent += c; await sleep(10); }
    return l;
  }

  async function prompt(text, cls, handler) {
    const wrap = document.createElement('div');
    wrap.className = 'input-wrapper history-line';
    const p = document.createElement('span');
    p.className = 'prompt';
    wrap.appendChild(p);
    const input = document.createElement('input');
    input.className = 'user-input-line';
    wrap.appendChild(input);
    logContainer.appendChild(wrap);
    currentPromptWrap = wrap;
    for (const c of text) { p.textContent += c; await sleep(8); }
    setTimeout(() => input.focus(), 0);
    return new Promise(resolve => {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          const v = input.value.trim().toUpperCase();
          input.disabled = true;
          const finalLine = createLine('highlight');
          finalLine.textContent = p.textContent + v;
          wrap.remove();
          currentPromptWrap = null;
          handler(v);
          resolve();
        }
      });
    });
  }

  // --- SCANNING (BRANCH: RQ_Q) ---
  async function pollFirstMatch() {
    try {
      const snapshot = await db.ref('/RQ_Q').orderByKey().limitToFirst(1).once('value');
      const data = snapshot.val();
      if (!data) {
        currentHead = null;
        if (lastQueueState !== 'EMPTY') { add('RQ_Q Buffer: Empty', 'system-msg'); lastQueueState = 'EMPTY'; }
        return;
      }
      const firstKey = Object.keys(data)[0];
      currentHead = { id: firstKey, data: data[firstKey] };
      if (lastQueueState !== firstKey) {
        add(`[SIGNAL DETECTED] ID: ${firstKey} | User: ${data[firstKey].username}`, 'success-msg');
        lastQueueState = firstKey;
      }
    } catch (e) { currentHead = null; }
  }

  function startPolling() {
    if (rqPollInterval) clearInterval(rqPollInterval);
    pollFirstMatch(); 
    rqPollInterval = setInterval(pollFirstMatch, 8000);
  }

  function stopPolling() { if (rqPollInterval) { clearInterval(rqPollInterval); rqPollInterval = null; } }

  // --- VERIFICATION (BRANCH: RQ_D) ---
  async function verifySession(rid) {
    try {
      const rSnap = await db.ref(`/R/${rid}`).once('value');
      if (rSnap.exists()) return { type: 'ACTIVE', data: rSnap.val() };
      
      const rqSnap = await db.ref(`/RQ_D/${rid}`).once('value');
      if (rqSnap.exists()) return { type: 'PENDING', data: rqSnap.val() };
      
      return null; 
    } catch (e) { return null; }
  }

  // --- STATE-BASED NAVIGATION ---
  function showMode() {
    if (localStorage.getItem(KEY_RID)) return;
    
    if (!currentHead) {
      // Empty: Allow R or B
      add('Queue Empty. Modes: [PR] Host Red | [PB] Host Blue | [A] Scan', 'system-msg');
    } else if (currentHead.data.color === 0) {
      // Red at head: Allow A(Join Blue) or R
      add(`RED Signal at Head. Modes: [A] Scan/Join Info | [PR] Host Red`, 'system-msg');
    } else {
      // Blue at head: Allow A(Join Red) or B
      add(`BLUE Signal at Head. Modes: [A] Scan/Join Info | [PB] Host Blue`, 'system-msg');
    }
    
    add('MODE:', '', true, handleMode);
  }

  async function handleMode(val) {
    const currentUser = localStorage.getItem(KEY_USER);

    // [A] MANUAL SCAN ONLY - NO AUTO TRIGGER
    if (val === 'A') {
      add('Initiating manual probe of RQ_Q head...', 'system-msg');
      await pollFirstMatch();
      
      if (!currentHead) {
        add('SCAN RESULT: Buffer clear. No active signals.', 'system-msg');
      } else {
        const h = currentHead.data;
        const colorLabel = h.color === 0 ? 'RED' : 'BLUE';
        add(`SCAN RESULT: [ID: ${currentHead.id}]`, 'highlight');
        add(`User: ${h.username} | Frequency: ${colorLabel}`, 'highlight');
        
        if (h.username === currentUser) {
          add('Status: Own signal detected.', 'error-msg');
        } else {
          const opposite = h.color === 0 ? 'PB (Join Blue)' : 'PR (Join Red)';
          add(`Recommended Action: Execute ${opposite}`, 'success-msg');
        }
      }
      return showMode(); 
    }

    // [PR/PB] EXPLICIT UPLINK
    if (val === 'PR') return registerHost(0); 
    if (val === 'PB') return registerHost(1);

    add('Invalid Protocol.', 'error-msg');
    return showMode();
  }

  // --- WORKER UPLINK ---
  async function registerHost(color) {
    const username = localStorage.getItem(KEY_USER);
    add(`Broadcasting ${color === 0 ? 'RED' : 'BLUE'} frequency to RQ...`, 'system-msg');
    
    try {
      const res = await fetch(WORKER_URL, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ username, color, lastActivity: Date.now() })
      });
      const data = await res.json();
      
      if (data.timestamp) {
        localStorage.setItem(KEY_RID, data.timestamp); 
        add(`Signal Registered: ${data.timestamp}`, 'success-msg');
        stopPolling();
        startMatchListener(); 
      }
    } catch { 
      add('Uplink failed. Worker unreachable.', 'error-msg'); 
      showMode(); 
    }
  }

  // --- MATCH LISTENER ---
  function startMatchListener() {
    const savedRid = localStorage.getItem(KEY_RID);
    if (!savedRid) return;

    toggleWaiting(true);
    const ref = db.ref(`/R/${savedRid}`);
    
    ref.on('value', snap => {
      const data = snap.val();
      if (data && lockedMatchId !== savedRid) {
        toggleWaiting(false);
        lockOntoMatch(savedRid, data, true);
      } else if (!data) {
        db.ref(`/RQ_D/${savedRid}`).once('value').then(dSnap => {
          if (!dSnap.exists()) {
            toggleWaiting(false);
            add(`SESSION EXPIRED: ${savedRid}`, 'error-msg');
            localStorage.removeItem(KEY_RID);
            ref.off();
            startPolling();
            showMode();
          }
        });
      }
    });
  }

  function lockOntoMatch(id, entry, isRecovery = false) {
    lockedMatchId = id;
    localStorage.setItem(KEY_RID, id); 
    stopPolling(); 
    add(isRecovery ? `SESSION RESTORED: ${id}` : `MATCH ESTABLISHED: ${id}`, 'success-msg');
    add(`HARD-LOCK ACTIVE: ${entry.username}`, 'highlight');
  }

  function toggleWaiting(active) {
    if (active) {
      if (waitAnimationInterval) return;
      const l = createLine('wait-msg');
      let dots = 0;
      waitAnimationInterval = setInterval(() => { 
        dots = (dots + 1) % 4; 
        l.textContent = "Awaiting match acknowledgement" + ".".repeat(dots); 
      }, 500);
    } else { 
      clearInterval(waitAnimationInterval); 
      waitAnimationInterval = null; 
    }
  }

  // --- AUTH & BOOT ---
  async function handleAuth(v) {
    const u = localStorage.getItem(KEY_USER), p = localStorage.getItem(KEY_PASS);
    if (!u) { 
      if (!v) return add('User ID:', '', true, handleAuth); 
      localStorage.setItem(KEY_USER, v); 
      return boot(); 
    }
    if (!p) { 
      if (!v) return add('Access Key:', '', true, handleAuth); 
      localStorage.setItem(KEY_PASS, v); 
      return boot(); 
    }
  }

  async function boot() {
    const u = localStorage.getItem(KEY_USER), p = localStorage.getItem(KEY_PASS), rid = localStorage.getItem(KEY_RID);
    
    if (!u || !p) {
      add('TERMINAL ACCESS: LOGIN REQUIRED', 'system-msg');
      return add('User ID:', '', true, handleAuth);
    }

    add('Core Protocol: Online.', 'success-msg');
    await pollFirstMatch(); // Initial scan

    if (rid) {
      add(`Validating Session Integrity: ${rid}`, 'system-msg');
      const session = await verifySession(rid);
      if (session) {
        if (session.type === 'ACTIVE') lockOntoMatch(rid, session.data, true);
        startMatchListener();
      } else {
        add(`ORPHANED SESSION DETECTED. PURGING...`, 'error-msg');
        localStorage.removeItem(KEY_RID);
        startPolling(); 
        showMode();
      }
    } else { 
      startPolling(); 
      showMode(); 
    }
  }

  window.addEventListener('DOMContentLoaded', boot);
})();
</script>
</body>
</html>
