<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Laser Chess Standard - Standard Variant(Core Edition)</title>
    <style>
        /* Using a high-reliability Google Font as the base for terminal aesthetic */
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            color: #b0b0b0; 
            font-family: 'Courier Prime', monospace;
            margin: 0;
            padding: 30px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        #terminal-log {
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .input-area {
            display: flex;
            margin-top: 10px;
        }

        #prompt { margin-right: 10px; color: #d0d0d0; }

        input {
            background: transparent;
            border: none;
            color: #ffffff;
            font-family: 'Courier Prime', monospace;
            font-size: inherit;
            outline: none;
            width: 100%;
        }

        .system-msg { color: #666666; }
        .success-msg { color: #888888; font-weight: bold; }
        .error-msg { color: #ff5555; }
        .highlight { color: #ffffff; }
        .user-entry { color: #d0d0d0; margin-bottom: 20px; border-left: 2px solid #333; padding-left: 10px; }
        
        input:disabled { opacity: 0.3; }
    </style>
</head>
<body>

<div id="terminal-log"></div>

<div class="input-area">
    <span id="prompt"></span>
    <input type="text" id="user-input" autofocus autocomplete="off">
</div>

<script>
    const log = document.getElementById('terminal-log');
    const input = document.getElementById('user-input');
    const prompt = document.getElementById('prompt');

    let currentState = "INIT";
    let tempUser = "";
    let msgQueue = [];
    let processingQueue = false;

    function addToQueue(text, className = "", newPrompt = null) {
        msgQueue.push({ text, className, newPrompt });
        if (!processingQueue) {
            processQueue();
        }
    }

    async function processQueue() {
        processingQueue = true;
        input.disabled = true;
        // Keep prompt empty while typing
        const oldPrompt = prompt.textContent;
        prompt.textContent = "";

        while (msgQueue.length > 0) {
            const { text, className, newPrompt } = msgQueue.shift();
            await typeLine(text, className);
            // If the message came with a specific prompt instruction, set it now
            if (newPrompt !== null) {
                prompt.textContent = newPrompt;
            }
        }

        processingQueue = false;
        input.disabled = false;
        input.focus();
    }

    function typeLine(text, className) {
        return new Promise((resolve) => {
            const div = document.createElement('div');
            div.className = className;
            log.appendChild(div);

            let i = 0;
            const speed = 40; 
            const timer = setInterval(() => {
                if (i < text.length) {
                    div.textContent += text.charAt(i);
                    i++;
                } else {
                    clearInterval(timer);
                    resolve();
                }
            }, speed);
        });
    }

    window.onload = () => {
        // Ensure prompt is blank on load
        prompt.textContent = "";

        addToQueue("Welcome to Laser Chess Online (Core Edition) - Standard Variant!", "highlight");
        
        const storedUser = localStorage.getItem('session_user');
        const storedPass = localStorage.getItem('session_pass');

        if (storedUser && storedPass) {
            addToQueue(`RETURNING OPERATOR: ${storedUser}`, "system-msg");
            addToQueue(`Session Username: ${storedUser}`);
            addToQueue(`Session Password: ${storedPass}`, "user-entry", ">");
            initSessionCreated();
        } else {
            startLoginSequence();
        }
    };

    function startLoginSequence() {
        addToQueue("--- NEW SESSION INITIALIZED ---", "system-msg", "Session Username:");
        currentState = "USERNAME";
    }

    input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !processingQueue) {
            const val = input.value.trim();
            handleSequence(val);
            input.value = "";
        }
    });

    function handleSequence(val) {
        const currentPrompt = prompt.textContent;
        
        switch(currentState) {
            case "USERNAME":
                tempUser = val;
                addToQueue(`${currentPrompt} ${val}`, "user-entry", "Session Password:");
                currentState = "PASSWORD";
                break;

            case "PASSWORD":
                if (val.length === 0 || val.length > 20) {
                    addToQueue(`${currentPrompt} ${val}`, "error-msg");
                    addToQueue("ERROR: PASSWORD MUST BE 1-20 CHARACTERS.", "error-msg", "Session Password:");
                    return;
                }
                localStorage.setItem('session_user', tempUser);
                localStorage.setItem('session_pass', val);
                addToQueue(`${currentPrompt} ${val}`, "user-entry");
                initSessionCreated();
                break;
        }
    }

    function initSessionCreated() {
        addToQueue("Local Session created.", "success-msg");
        addToQueue("Type R if you want to play as Red, B if you want to play Blue, A for whatever color is available for a quick match in the public lobby. Or press PR(if you want a private match where you are red) or PB(if you want a private match where you are blue). You will receive a game ID which will expire in 24H.", "", ">");
        currentState = "MODE_SELECT";
    }
</script>

</body>
</html>
