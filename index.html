<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Laser Chess - Core Edition</title>
    <style>
        @font-face {
            font-family: 'Unifont';
            src: url('unifont-15.0.01.ttf') format('truetype');
            font-weight: normal; font-style: normal; font-display: block;
        }

        body {
            background-color: #0a0a0a;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            color: #b0b0b0; 
            font-family: 'Unifont', 'Courier New', monospace; /* Fallback fonts added */
            font-size: 16px; 
            margin: 0; padding: 30px; 
            line-height: 1.6;
            image-rendering: pixelated;
        }

        #terminal-log { display: flex; flex-direction: column; }
        .input-wrapper { display: flex; align-items: baseline; margin-top: 5px; }
        
        .user-input-line {
            background: transparent; border: none; color: #ffffff;
            font-family: inherit; font-size: 16px;
            outline: none; flex-grow: 1; margin-left: 8px; caret-color: #ffffff;
        }

        .system-msg { color: #555; }
        .success-msg { color: #ffffff; font-weight: bold; text-shadow: 0 0 5px #fff; }
        .error-msg { color: #ff5555; }
        .highlight { color: #ffffff; font-weight: bold; }
        .history-line { margin-bottom: 4px; min-height: 1.6em; word-break: break-all; }
    </style>
</head>
<body>

<div id="terminal-log"></div>

<script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>

<script>
    // --- CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyBuT7P1iTdXcZW-y05DX-kseuLrPGmaWSs",
        authDomain: "laserchess-web-free.firebaseapp.com",
        databaseURL: "https://laserchess-web-free-default-rtdb.firebaseio.com",
        projectId: "laserchess-web-free"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const log = document.getElementById('terminal-log');
    let msgQueue = [];
    let isProcessing = false;
    let activeQueueMatch = null;
    let currentLobbySub = null;

    // --- ENGINE: TYPEWRITER ---
    function addToQueue(text, className = "", isRequest = false) {
        msgQueue.push({ text, className, isRequest });
        if (!isProcessing) processQueue();
    }

    async function processQueue() {
        if (isProcessing) return;
        isProcessing = true;
        
        try {
            while (msgQueue.length > 0) {
                const item = msgQueue.shift();
                if (item.isRequest) await typeLineInline(item.text, item.className);
                else await typeLineSimple(item.text, item.className);
            }
        } catch (e) {
            console.error("Terminal Error:", e);
        } finally {
            isProcessing = false;
            // Catch any messages added while finishing
            if (msgQueue.length > 0) processQueue(); 
        }
    }

    function typeLineSimple(text, className) {
        return new Promise((resolve) => {
            const div = document.createElement('div');
            div.className = "history-line " + className;
            log.appendChild(div);
            let i = 0;
            if (!text) return resolve();
            const timer = setInterval(() => {
                if (i < text.length) {
                    div.textContent += text.charAt(i);
                    i++;
                    window.scrollTo(0, document.body.scrollHeight);
                } else {
                    clearInterval(timer);
                    resolve();
                }
            }, 8); // Slightly faster for UX
        });
    }

    function typeLineInline(text, className) {
        return new Promise((resolve) => {
            const wrapper = document.createElement('div');
            wrapper.className = "input-wrapper history-line " + className;
            wrapper.innerHTML = `<span></span><input type="text" class="user-input-line" disabled autocomplete="off">`;
            log.appendChild(wrapper);
            const label = wrapper.querySelector('span');
            const input = wrapper.querySelector('input');
            
            let i = 0;
            const timer = setInterval(() => {
                if (i < text.length) {
                    label.textContent += text.charAt(i);
                    i++;
                } else {
                    clearInterval(timer);
                    input.disabled = false;
                    input.focus();
                    input.onkeydown = (e) => {
                        if (e.key === 'Enter') {
                            const val = input.value.trim().toUpperCase();
                            input.disabled = true;
                            input.onkeydown = null; // Prevent double-trigger
                            handleGlobalLogic(val);
                            resolve();
                        }
                    };
                }
            }, 8);
        });
    }

    // --- LOGIC: LOBBY & MATCHMAKING ---
    function handleGlobalLogic(val) {
        const u = localStorage.getItem('ls_user');
        const p = localStorage.getItem('ls_pass');

        if (!u) {
            if(!val) { addToQueue("USERNAME REQUIRED:", "error-msg", true); return; }
            localStorage.setItem('ls_user', val);
            bootSequence();
        } else if (!p) {
            if(!val) { addToQueue("PASSKEY REQUIRED:", "error-msg", true); return; }
            localStorage.setItem('ls_pass', val);
            startLobbySync();
        } else {
            executeMatchAction(val);
        }
    }

    function startLobbySync() {
        if (currentLobbySub) db.ref('lobby').off('value', currentLobbySub);

        // Limit to 1 to find the oldest public game (Numeric Key)
        currentLobbySub = db.ref('lobby').orderByKey().limitToFirst(1).on('value', snap => {
            let foundMatch = null;
            if (snap.exists()) {
                snap.forEach(c => {
                    // Only treat as a "Joinable Lobby" if it starts with a number
                    if (/^[0-9]/.test(c.key)) {
                        foundMatch = { id: c.key, data: c.val() };
                    }
                });
            }
            activeQueueMatch = foundMatch;
            renderLobby();
        }, err => {
            addToQueue("DATABASE ERROR: " + err.message, "error-msg");
        });
    }

    function renderLobby() {
        // Clear previous prompts if the lobby updates
        addToQueue("--- LOBBY REFRESH ---", "system-msg");
        
        if (activeQueueMatch) {
            const side = activeQueueMatch.data.rn !== "" ? "RED" : "BLUE";
            addToQueue(`MATCH FOUND: ${activeQueueMatch.id} [${side} OCCUPIED]`, "highlight");
            addToQueue("[A] JOIN OPPOSITE | [R] NEW RED | [B] NEW BLUE", "system-msg");
        } else {
            addToQueue("QUEUE STATUS: EMPTY.", "system-msg");
            addToQueue("[R] CREATE RED | [B] CREATE BLUE", "system-msg");
        }
        addToQueue("COMMAND>", "", true);
    }

    function executeMatchAction(cmd) {
        const u = localStorage.getItem('ls_user');
        const p = localStorage.getItem('ls_pass');

        if (cmd === "R") {
            if (activeQueueMatch && activeQueueMatch.data.rn !== "") {
                addToQueue("DENIED: RED TAKEN. JOIN BLUE [A].", "error-msg");
                renderLobby();
            } else create(1, u, p);
        } else if (cmd === "B") {
            if (activeQueueMatch && activeQueueMatch.data.bn !== "") {
                addToQueue("DENIED: BLUE TAKEN. JOIN RED [A].", "error-msg");
                renderLobby();
            } else create(0, u, p);
        } else if (cmd === "A" && activeQueueMatch) {
            join(activeQueueMatch.data.rn !== "" ? 0 : 1, u, p);
        } else if (cmd === "CLEAR") {
            localStorage.clear();
            location.reload();
        } else {
            addToQueue("INVALID COMMAND. (R, B, A, or CLEAR)", "error-msg");
            renderLobby();
        }
    }

    function create(col, u, p) {
        const id = Date.now().toString();
        const payload = {
            createdAt: Date.now(),
            rn: col === 1 ? u : "",
            bn: col === 0 ? u : "",
            rp: col === 1 ? p : "",
            bp: col === 0 ? p : ""
        };
        
        db.ref(`lobby/${id}`).set(payload).then(() => {
            addToQueue(`SUCCESS: MATCH ${id} CREATED.`, "success-msg");
        }).catch(err => {
            addToQueue(`WRITE REJECTED: ${err.message}`, "error-msg");
            renderLobby();
        });
    }

    function join(col, u, p) {
        const oldId = activeQueueMatch.id;
        const newId = "G" + oldId;
        const data = activeQueueMatch.data;

        const upd = {};
        upd[`lobby/${oldId}`] = null; // Rule-compliant Delete
        upd[`lobby/${newId}`] = {     // Rule-compliant 'G' Write
            createdAt: Date.now(),
            rn: col === 1 ? u : data.rn,
            bn: col === 0 ? u : data.bn,
            rp: col === 1 ? p : data.rp,
            bp: col === 0 ? p : data.bp
        };
        
        db.ref().update(upd).then(() => {
            addToQueue("HANDSHAKE SUCCESS. REDIRECTING...", "success-msg");
        }).catch(err => {
            addToQueue(`JOIN REJECTED: ${err.message}`, "error-msg");
            renderLobby();
        });
    }

    async function bootSequence() {
        console.log("Booting Core...");
        
        // Non-blocking Font Load
        if (document.fonts) {
            document.fonts.load('16px Unifont').then(() => console.log("Font Active")).catch(() => {});
        }

        const u = localStorage.getItem('ls_user');
        const p = localStorage.getItem('ls_pass');
        
        if (!u) {
            addToQueue("LASER CHESS CORE TERMINAL v2.1.0", "highlight");
            addToQueue("IDENTIFY USER:", "", true);
        } else if (!p) {
            addToQueue(`WELCOME BACK, ${u}.`, "highlight");
            addToQueue("ENTER PASSKEY:", "", true);
        } else {
            startLobbySync();
        }
    }

    // Start
    window.onload = bootSequence;
</script>
</body>
</html>
