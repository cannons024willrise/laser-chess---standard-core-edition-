<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LASER CHESS - CORE EDITION (BETA η)</title>

  <style>
    @font-face { font-family: 'Unifont'; src: url('unifont-15.0.01.ttf') format('truetype'); }
    :root { --bg0: #0a0a0a; --bg1: #1a1a1a; --text: #b0b0b0; --bright: #ffffff; --error: #ff5555; --muted: #999999; --waiting: #00ff00; }
    body { margin: 0; padding: 30px; color: var(--text); font-family: 'Unifont', monospace; background: radial-gradient(circle at center, var(--bg1), var(--bg0)); }
    #terminal-log { display: flex; flex-direction: column; gap: 4px; max-width: 1100px; }
    .history-line { white-space: pre-wrap; word-break: break-all; }
    .input-wrapper { display:flex; gap:8px; }
    .prompt { white-space: pre; }
    .user-input-line { flex:1; background: transparent; border: none; color: var(--bright); font: inherit; outline: none; }
    .system-msg { color: var(--muted); }
    .success-msg { color: var(--bright); font-weight: 700; }
    .error-msg { color: var(--error); }
    .highlight { color: var(--bright); font-weight: 700; }
    .wait-msg { color: var(--waiting); }
  </style>
</head>

<body>
<div id="terminal-log"></div>

<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.1/firebase-database-compat.js"></script>

<script>
(() => {
  'use strict';

  const matchFirebaseConfig = {
    apiKey: "AIzaSyBpOnnJInXkDPZ8hrKj-rpjw3qeTylxtw4",
    authDomain: "lasercheowefficiencymanager.firebaseapp.com",
    databaseURL: "https://lasercheowefficiencymanager-default-rtdb.firebaseio.com",
    projectId: "lasercheowefficiencymanager",
    storageBucket: "lasercheowefficiencymanager.firebasestorage.app",
    messagingSenderId: "28090691314",
    appId: "1:28090691314:web:e8c8ae5b0fd437038b6a6b"
  };

  const WORKER_URL = 'https://laserchessmatchmanager.later5143.workers.dev/';
  const app = firebase.apps?.length ? firebase.app() : firebase.initializeApp(matchFirebaseConfig);
  const db = firebase.database(app);

  const KEY_USER = 'ls_user', KEY_PASS = 'ls_pass', KEY_RID = 'ls_request_id';
  const logContainer = document.getElementById('terminal-log');
  const queue = [];
  let processing = false, currentPromptWrap = null, lockedMatchId = null;
  let rqPollInterval = null, waitAnimationInterval = null, lastQueueState = 'INIT';
  let currentHead = null; 

  const sleep = ms => new Promise(r => setTimeout(r, ms));

  function createLine(cls='') {
    const d = document.createElement('div');
    d.className = `history-line ${cls}`;
    if (currentPromptWrap) logContainer.insertBefore(d, currentPromptWrap);
    else logContainer.appendChild(d);
    return d;
  }

  function add(text, cls='', req=false, handler=null) {
    if (!req && processing) { type(text, cls, true); return; }
    queue.push({text,cls,req,handler});
    if (!processing) run();
  }

  async function run() {
    processing = true;
    while(queue.length) {
      const i = queue.shift();
      if (i.req) await prompt(i.text, i.cls, i.handler || handleAuth);
      else await type(i.text, i.cls);
    }
    processing = false;
  }

  async function type(text, cls, immediate=false) {
    const l = createLine(cls);
    if (immediate) { l.textContent = text; return l; }
    for (const c of text) { l.textContent += c; await sleep(10); }
    return l;
  }

  async function prompt(text, cls, handler) {
    const wrap = document.createElement('div');
    wrap.className = 'input-wrapper history-line';
    const p = document.createElement('span');
    p.className = 'prompt';
    wrap.appendChild(p);
    const input = document.createElement('input');
    input.className = 'user-input-line';
    wrap.appendChild(input);
    logContainer.appendChild(wrap);
    currentPromptWrap = wrap;
    for (const c of text) { p.textContent += c; await sleep(8); }
    setTimeout(() => input.focus(), 0);
    return new Promise(resolve => {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          const v = input.value.trim().toUpperCase();
          input.disabled = true;
          const finalLine = createLine('highlight');
          finalLine.textContent = p.textContent + v;
          wrap.remove();
          currentPromptWrap = null;
          handler(v);
          resolve();
        }
      });
    });
  }

  async function pollFirstMatch() {
    try {
      const snapshot = await db.ref('/RQ_Q').orderByKey().limitToFirst(1).once('value');
      const data = snapshot.val();
      if (!data) {
        currentHead = null;
        if (lastQueueState !== 'EMPTY') { add('RQ_Q: Empty (Idle)', 'system-msg'); lastQueueState = 'EMPTY'; }
        return;
      }
      const firstKey = Object.keys(data)[0];
      currentHead = { id: firstKey, data: data[firstKey] };
      if (lastQueueState !== firstKey) {
        add(`[AUTO-SCAN] Head detected: ${data[firstKey].username} (${data[firstKey].color === 0 ? 'RED' : 'BLUE'})`, 'success-msg');
        lastQueueState = firstKey;
      }
    } catch (e) { currentHead = null; }
  }

  function startPolling() {
    if (rqPollInterval) clearInterval(rqPollInterval);
    pollFirstMatch(); 
    rqPollInterval = setInterval(pollFirstMatch, 6000);
  }

  function stopPolling() { if (rqPollInterval) { clearInterval(rqPollInterval); rqPollInterval = null; } }

  async function verifySession(rid) {
    try {
      const rSnap = await db.ref(`/R/${rid}`).once('value');
      if (rSnap.exists()) return { type: 'ACTIVE', data: rSnap.val() };
      const rqSnap = await db.ref(`/RQ_D/${rid}`).once('value');
      if (rqSnap.exists()) return { type: 'PENDING', data: rqSnap.val() };
      return null; 
    } catch (e) { return null; }
  }

  function showMode() {
    if (localStorage.getItem(KEY_RID)) return;
    if (!currentHead) {
      add('Queue Empty. [R] Host Red | [B] Host Blue', 'system-msg');
    } else if (currentHead.data.color === 0) {
      add(`RED at head. [A] Join as Blue | [R] Host Red`, 'system-msg');
    } else {
      add(`BLUE at head. [A] Join as Red | [B] Host Blue`, 'system-msg');
    }
    add('MODE:', '', true, handleMode);
  }

  async function handleMode(val) {
    const currentUser = localStorage.getItem(KEY_USER);

    if (val === 'A') {
      if (!currentHead) {
        add('JOIN FAILED: No active signals.', 'error-msg');
        return showMode();
      }
      if (currentHead.data.username === currentUser) {
        add('JOIN FAILED: Self-intercept forbidden.', 'error-msg');
        return showMode();
      }
      const targetColor = currentHead.data.color === 0 ? 1 : 0; 
      add(`Intercepting ${currentHead.id}...`, 'wait-msg');
      return registerHost(targetColor, true); // true = Intercept
    }

    if (val === 'R') return registerHost(0, false); 
    if (val === 'B') return registerHost(1, false);

    add('Unknown Command.', 'error-msg');
    return showMode();
  }

  async function registerHost(color, isIntercept = false) {
    const username = localStorage.getItem(KEY_USER);
    try {
      const res = await fetch(WORKER_URL, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ 
          username, 
          color, 
          isIntercept, 
          lastActivity: Date.now() 
        })
      });
      const data = await res.json();
      if (data.timestamp) {
        localStorage.setItem(KEY_RID, data.timestamp); 
        add(`${isIntercept ? 'Intercept' : 'Uplink'} Success: ${data.timestamp}`, 'success-msg');
        stopPolling();
        startMatchListener(); 
      } else {
        add(`Uplink Denied: ${data.error || 'Unknown'}`, 'error-msg');
        showMode();
      }
    } catch { add('Worker Connection Failed.', 'error-msg'); showMode(); }
  }

  function startMatchListener() {
    const savedRid = localStorage.getItem(KEY_RID);
    if (!savedRid) return;
    toggleWaiting(true);
    const ref = db.ref(`/R/${savedRid}`);
    ref.on('value', snap => {
      const data = snap.val();
      if (data && lockedMatchId !== savedRid) {
        toggleWaiting(false);
        lockOntoMatch(savedRid, data, true);
      } else if (!data) {
        db.ref(`/RQ_D/${savedRid}`).once('value').then(dSnap => {
          if (!dSnap.exists()) {
            toggleWaiting(false);
            add('SESSION EXPIRED.', 'error-msg');
            localStorage.removeItem(KEY_RID);
            ref.off();
            startPolling();
            showMode();
          }
        });
      }
    });
  }

  function lockOntoMatch(id, entry, isRecovery = false) {
    lockedMatchId = id;
    localStorage.setItem(KEY_RID, id); 
    stopPolling(); 
    add(isRecovery ? `LINK RESTORED: ${id}` : `LINK ESTABLISHED: ${id}`, 'success-msg');
    add(`OPPONENT: ${entry.username}`, 'highlight');
  }

  function toggleWaiting(active) {
    if (active) {
      if (waitAnimationInterval) return;
      const l = createLine('wait-msg');
      let dots = 0;
      waitAnimationInterval = setInterval(() => { dots = (dots + 1) % 4; l.textContent = "Awaiting Handshake" + ".".repeat(dots); }, 500);
    } else { if (waitAnimationInterval) { clearInterval(waitAnimationInterval); waitAnimationInterval = null; } }
  }

  async function handleAuth(v) {
    const u = localStorage.getItem(KEY_USER), p = localStorage.getItem(KEY_PASS);
    if (!u) { if (!v) return add('User ID:', '', true, handleAuth); localStorage.setItem(KEY_USER, v); return boot(); }
    if (!p) { if (!v) return add('Access Key:', '', true, handleAuth); localStorage.setItem(KEY_PASS, v); return boot(); }
  }

  async function boot() {
    const u = localStorage.getItem(KEY_USER), p = localStorage.getItem(KEY_PASS), rid = localStorage.getItem(KEY_RID);
    if (!u || !p) return add('TERMINAL LOCKED', 'system-msg'), add('User ID:', '', true, handleAuth);
    
    add('System Online.', 'success-msg');
    await pollFirstMatch();
    
    if (rid) {
      const session = await verifySession(rid);
      if (session) {
        if (session.type === 'ACTIVE') lockOntoMatch(rid, session.data, true);
        startMatchListener();
      } else {
        localStorage.removeItem(KEY_RID);
        startPolling(); showMode();
      }
    } else { startPolling(); showMode(); }
  }

  window.addEventListener('DOMContentLoaded', boot);
})();
</script>
</body>
</html>
