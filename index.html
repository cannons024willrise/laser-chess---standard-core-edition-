<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Khet 2.0 ASCII Renderer</title>
    <style>
        body { 
            background: #000; 
            color: #00FF00; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px;
        }
        .board-wrapper {
            border: 2px solid #555;
            padding: 10px;
            background: #050505;
        }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(10, 45px); 
            grid-template-rows: repeat(8, 45px); 
            background: #111;
        }
        .cell { 
            width: 45px; 
            height: 45px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 28px;
            border: 0.5px solid #222;
        }
        /* Player Colors */
        .p0 { color: #00ccff; } /* Silver/Blue */
        .p1 { color: #ff4444; } /* Red */
        .empty { color: #333; font-size: 18px; }
        
        .status { margin-bottom: 15px; font-size: 18px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="status">
        TURN: <span id="turn-display"></span>
    </div>

    <div class="board-wrapper">
        <div id="board" class="grid"></div>
    </div>

<script>
    const state = "0147010250010397110400410543210644110753110854210937111040411157111260411332111421411523411603211724111804311993112073312194412274212367212421312529112670410";

    const getPiece = (id, rot) => {
        const r = rot % 4;
        
        // KING
        if (id <= 2) return "◈"; 

        // LASERS: 0=N, 1=E, 2=S, 3=W (using your custom symbols)
        if (id <= 4) return ["⫝", "⟜", "Ͳ", "Ð"][r];

        // DEFENDERS: 0=N, 1=E, 2=S, 3=W
        if (id <= 8) return ["⬒", "◨", "⬓", "◧"][r];

        // SWITCHES (Based on orientation)
        if (id <= 12) return (r % 2 === 0) ? "⟋" : "⟍";

        // DEFLECTORS (Pyramids)
        return ["◤", "◥", "◢", "◣"][r];
    };

    const boardEl = document.getElementById('board');
    const turnEl = document.getElementById('turn-display');
    
    // Parse turn (157th digit)
    const turn = state.slice(-1);
    turnEl.innerText = turn === "0" ? "SILVER (BLUE)" : "RED";
    turnEl.style.color = turn === "0" ? "#00ccff" : "#ff4444";

    const grid = Array(8).fill(0).map(() => Array(10).fill(null));

    // Parse the 26 pieces (156 digits)
    for (let i = 0; i < 26; i++) {
        const chunk = state.substr(i * 6, 6);
        const id    = parseInt(chunk.substr(0, 2));
        const x     = parseInt(chunk.substr(2, 1));
        const y     = parseInt(chunk.substr(3, 1));
        const rot   = parseInt(chunk.substr(4, 1));
        const owner = parseInt(chunk.substr(5, 1));

        if (y < 8 && x < 10) {
            grid[y][x] = { symbol: getPiece(id, rot), owner };
        }
    }

    // Render Grid (Y-axis 7 down to 0)
    for (let y = 7; y >= 0; y--) {
        for (let x = 0; x < 10; x++) {
            const cellDiv = document.createElement('div');
            cellDiv.className = 'cell';
            const data = grid[y][x];

            if (data) {
                cellDiv.innerHTML = `<span class="p${data.owner}">${data.symbol}</span>`;
            } else {
                cellDiv.innerHTML = `<span class="empty">·</span>`;
            }
            boardEl.appendChild(cellDiv);
        }
    }
</script>
</body>
</html>
