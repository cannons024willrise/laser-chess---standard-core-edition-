<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KHET_MIN_OS</title>
    <style>
        @font-face {
            font-family: 'Unifont';
            src: url('unifont-15.0.01.ttf') format('truetype');
            font-display: block;
        }

        body { 
            background: #000; 
            color: #0f0; 
            font-family: 'Unifont', monospace; 
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #terminal {
            background: #050505;
            padding: 10px;
            border: 1px solid #222;
            display: inline-block;
        }

        pre {
            font-size: 24px; /* Slightly smaller for compactness */
            line-height: 0.9; /* Tight vertical spacing */
            letter-spacing: -1px; /* Minimal horizontal spacing */
            margin: 0;
            font-family: 'Unifont', monospace;
        }

        .b { color: #00d4ff; }
        .r { color: #ff3333; }
        .d { color: #222; }
        
        .input-area {
            margin-top: 15px;
            width: 100%;
            max-width: 600px;
        }

        input {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            color: #0f0;
            padding: 8px;
            font-family: 'Unifont', monospace;
            outline: none;
            font-size: 16px;
        }

        .status-bar { 
            display: flex; 
            justify-content: space-between; 
            width: 100%; 
            max-width: 600px; 
            color: #444; 
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div id="terminal">
    <pre id="screen">_</pre>
</div>

<div class="input-area">
    <input type="text" id="raw-input" placeholder="INPUT_STR" autocomplete="off" oninput="processInput()">
    <div class="status-bar">
        <span id="turn-info">T:--</span>
        <span id="digit-count">L:0</span>
    </div>
</div>

<script>
    const screen = document.getElementById('screen');
    const inputField = document.getElementById('raw-input');
    const counter = document.getElementById('digit-count');
    const turnInfo = document.getElementById('turn-info');

    const getSymbol = (type, rot) => {
        const r = rot % 4;
        switch(type) {
            case 0: case 5: return "◈"; 
            case 1: case 6: return ["⫝", "⟜", "Ͳ", "Ð"][r]; 
            case 2: case 7: return (r % 2 === 0) ? "⟋" : "⟍"; 
            case 3: case 8: return ["⬒", "◨", "⬓", "◧"][r]; 
            case 4: case 9: return ["◤", "◥", "◢", "◣"][r]; 
            default: return "?";
        }
    };

    function processInput() {
        const raw = inputField.value.trim().replace(/\s/g, '');
        counter.innerText = `L:${raw.length}`;
        
        if (raw.length === 0) {
            screen.innerHTML = "_";
            turnInfo.innerHTML = "T:--";
            return;
        }

        const grid = Array(8).fill(0).map(() => Array(10).fill(null));
        const pieceCount = Math.floor(raw.length / 6);

        for (let i = 0; i < pieceCount; i++) {
            const block = raw.substr(i * 6, 6);
            const type = parseInt(block[1]);
            const x    = parseInt(block[2]);
