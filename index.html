<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Laser Chess - Standard Version (Core Edition)</title>
    <style>
        @font-face {
            font-family: 'Unifont';
            src: url('unifont-15.0.01.ttf') format('truetype');
        }

        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            color: #b0b0b0; font-family: 'Unifont', monospace;
            font-size: 16px; margin: 0; padding: 30px; line-height: 1.6;
            image-rendering: pixelated;
        }

        #terminal-log { display: flex; flex-direction: column; }
        .input-wrapper { display: flex; align-items: baseline; margin-top: 5px; }
        
        .user-input-line {
            background: transparent; border: none; color: #ffffff;
            font-family: 'Unifont', monospace; font-size: 16px;
            outline: none; flex-grow: 1; margin-left: 8px; caret-color: #ffffff;
        }

        .system-msg { color: #666; margin-bottom: 5px; }
        .success-msg { color: #ffffff; font-weight: bold; margin-bottom: 5px; }
        .error-msg { color: #ff5555; margin-bottom: 5px; }
        .highlight { color: #ffffff; margin-bottom: 10px; font-weight: bold; }
        .rules-link { color: #4444ff; text-decoration: underline; font-weight: bold; }
        .history-line { margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="terminal-log"></div>

<script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBuT7P1iTdXcZW-y05DX-kseuLrPGmaWSs",
        authDomain: "laserchess-web-free.firebaseapp.com",
        databaseURL: "https://laserchess-web-free-default-rtdb.firebaseio.com",
        projectId: "laserchess-web-free",
        storageBucket: "laserchess-web-free.firebasestorage.app",
        messagingSenderId: "887464510754",
        appId: "1:887464510754:web:aee6938681543602a4517b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const SERVER_TIMESTAMP = firebase.database.ServerValue.TIMESTAMP;

    const log = document.getElementById('terminal-log');
    let msgQueue = [];
    let isProcessing = false;
    let currentState = "USERNAME";
    let tempUser = "";

    function addToQueue(text, className = "", isRequest = false) {
        msgQueue.push({ text, className, isRequest });
        if (!isProcessing) processQueue();
    }

    async function processQueue() {
        isProcessing = true;
        while (msgQueue.length > 0) {
            const item = msgQueue.shift();
            if (item.isRequest) {
                await typeLineInline(item.text, item.className);
            } else {
                await typeLineSimple(item.text, item.className);
            }
        }
        isProcessing = false;
    }

    function typeLineSimple(text, className) {
        return new Promise((resolve) => {
            const div = document.createElement('div');
            div.className = (className || "") + " history-line";
            log.appendChild(div);
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = text;
            const plainText = tempDiv.textContent;
            let i = 0;
            const timer = setInterval(() => {
                if (i < plainText.length) {
                    div.textContent += plainText.charAt(i);
                    i++;
                } else {
                    clearInterval(timer);
                    div.innerHTML = text; 
                    window.scrollTo(0, document.body.scrollHeight);
                    resolve();
                }
            }, 12);
        });
    }

    function typeLineInline(text, className) {
        return new Promise((resolve) => {
            const wrapper = document.createElement('div');
            wrapper.className = "input-wrapper history-line " + (className || "");
            const label = document.createElement('span');
            const input = document.createElement('input');
            input.type = "text";
            input.className = "user-input-line";
            input.maxLength = 20;
            input.disabled = true;
            wrapper.appendChild(label);
            wrapper.appendChild(input);
            log.appendChild(wrapper);
            let i = 0;
            const timer = setInterval(() => {
                if (i < text.length) {
                    label.textContent += text.charAt(i);
                    i++;
                } else {
                    clearInterval(timer);
                    input.disabled = false;
                    input.focus();
                    window.scrollTo(0, document.body.scrollHeight);
                    const handleEnter = (e) => {
                        if (e.key === 'Enter') {
                            const val = input.value.trim();
                            input.disabled = true;
                            input.removeEventListener('keydown', handleEnter);
                            handleStateLogic(val);
                            resolve(); 
                        }
                    };
                    input.addEventListener('keydown', handleEnter);
                }
            }, 12); 
        });
    }

    function handleStateLogic(val) {
        if (currentState === "USERNAME") {
            if (val.length === 0) {
                addToQueue("Username required:", "error-msg", true);
                return;
            }
            tempUser = val;
            currentState = "PASSWORD";
            addToQueue("Session Password (max 20):", "", true);
        } else if (currentState === "PASSWORD") {
            if (val.length === 0) {
                addToQueue("Password required:", "error-msg", true);
                return;
            }
            authenticateUser(tempUser, val);
        }
    }

    function authenticateUser(u, p) {
        addToQueue("VERIFYING CREDENTIALS...", "system-msg");
        
        // 1. Attempt standard Login (Heartbeat to 'a')
        const heartbeatData = {
            password: p,
            lastplayed: SERVER_TIMESTAMP
        };

        db.ref('a/' + u).set(heartbeatData).then(() => {
            finalizeLogin(u, p);
        }).catch(() => {
            // 2. Login failed. Attempt Multi-Path Registration
            addToQueue("AUTHORIZATION FAILED. ATTEMPTING NEW REGISTRATION...", "system-msg");
            
            const registrationUpdates = {};
            registrationUpdates['s/' + u] = p; // The vault secret
            registrationUpdates['a/' + u] = heartbeatData; // The lobby heartbeat

            db.ref().update(registrationUpdates).then(() => {
                finalizeLogin(u, p);
            }).catch(err => {
                addToQueue("ACCESS DENIED: INVALID PASSWORD OR USERNAME TAKEN.", "error-msg");
                localStorage.clear();
                currentState = "USERNAME";
                addToQueue("Session Username (max 20):", "", true);
            });
        });
    }

    function finalizeLogin(u, p) {
        localStorage.setItem('session_user', u);
        localStorage.setItem('session_pass', p);
        addToQueue("IDENTITY ESTABLISHED. VAULT LOCKED.", "success-msg");
        currentState = "READY";
        addToQueue("Terminal online. Scanning for stale sessions...", "system-msg");
        runJanitorSweep();
    }

    function runJanitorSweep() {
        // Look at the whole lobby to find stale targets
        db.ref('a').once('value', snapshot => {
            const localNow = Date.now();
            snapshot.forEach(child => {
                const data = child.val();
                const targetUser = child.key;
                
                // If it looks older than 24H locally, attempt the multi-path purge
                if (localNow - data.lastplayed > 86400000) {
                    const purgePaths = {};
                    purgePaths['s/' + targetUser] = null;
                    purgePaths['a/' + targetUser] = null;
                    purgePaths['m/' + targetUser] = null;
                    purgePaths['g/' + targetUser] = null;

                    db.ref().update(purgePaths)
                        .then(() => console.log("Janitor wiped stale identity: " + targetUser))
                        .catch(() => {}); // Fails silently if server disagrees on the timestamp
                }
            });
        });
    }

    window.onload = () => {
        addToQueue("Laser Chess - Standard Version (Core Edition)", "highlight");
        addToQueue('Site for Laser Chess. <a href="https://www.youtube.com/watch?v=UqLa-LOficM&t=53s" class="rules-link" target="_blank">Rules</a>.', "system-msg");
        addToQueue("IDENTITY NOTICE: 24H Auto-Wipe active.", "highlight");

        const savedUser = localStorage.getItem('session_user');
        const savedPass = localStorage.getItem('session_pass');

        if (savedUser && savedPass) {
            addToQueue("LOCAL SESSION FOUND. VERIFYING...", "system-msg");
            
            const heartbeatData = {
                password: savedPass,
                lastplayed: SERVER_TIMESTAMP
            };

            db.ref('a/' + savedUser).set(heartbeatData).then(() => {
                addToQueue("VERIFICATION SUCCESSFUL. Welcome, " + savedUser + ".", "success-msg");
                currentState = "READY";
                runJanitorSweep();
            }).catch(err => {
                addToQueue("SESSION INVALID OR EXPIRED.", "error-msg");
                localStorage.clear();
                currentState = "USERNAME";
                addToQueue("Session Username (max 20):", "", true);
            });
        } else {
            addToQueue("Session Username (max 20):", "", true);
        }
    };
</script>
</body>
</html>
