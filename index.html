<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Laser Chess Standard(Core)</title>
    <style>
        @font-face {
            font-family: 'Unifont';
            src: url('https://cdn.jsdelivr.net/npm/gnu-unifont@1.0.0/unifont.woff2') format('woff2');
        }

        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            color: #b0b0b0; 
            font-family: 'Unifont', monospace;
            margin: 0;
            padding: 30px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow-y: scroll;
            scrollbar-width: none;
        }

        #terminal-log {
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .input-area {
            display: flex;
            margin-top: 10px;
        }

        #prompt { margin-right: 10px; color: #d0d0d0; }

        input {
            background: transparent;
            border: none;
            color: #ffffff;
            font-family: 'Unifont', monospace;
            font-size: inherit;
            outline: none;
            width: 100%;
        }

        .system-msg { color: #666666; }
        .success-msg { color: #888888; font-weight: bold; }
        .error-msg { color: #ff5555; }
        .highlight { color: #ffffff; text-shadow: 0 0 5px rgba(255,255,255,0.2); }
        .user-entry { color: #d0d0d0; margin-bottom: 20px; border-left: 2px solid #333; padding-left: 10px; }
        
        input:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>

<div id="terminal-log"></div>

<div class="input-area" id="input-container">
    <span id="prompt"></span>
    <input type="text" id="user-input" autofocus autocomplete="off">
</div>

<script>
    const log = document.getElementById('terminal-log');
    const input = document.getElementById('user-input');
    const prompt = document.getElementById('prompt');

    let currentState = "INIT";
    let tempUser = "";
    let isTyping = false;

    window.onload = async () => {
        await typePrint("Welcome to Laser Chess Online (Core Edition) - Standard Variant!", "highlight");
        
        const storedUser = localStorage.getItem('session_user');
        const storedPass = localStorage.getItem('session_pass');

        if (storedUser && storedPass) {
            await typePrint(`RETURNING OPERATOR: ${storedUser}`, "system-msg");
            await typePrint(`Session Username: ${storedUser}`);
            await typePrint(`Session Password: ${storedPass}`, "user-entry");
            await initSessionCreated();
        } else {
            await startLoginSequence();
        }
    };

    async function startLoginSequence() {
        await typePrint("--- NEW SESSION INITIALIZED ---", "system-msg");
        prompt.textContent = "Session Username:";
        currentState = "USERNAME";
    }

    async function typePrint(text, className = "", speed = 50) {
        lockInput(true);
        const div = document.createElement('div');
        div.className = className;
        log.appendChild(div);
        
        for (let i = 0; i < text.length; i++) {
            div.textContent += text[i];
            window.scrollTo(0, document.body.scrollHeight);
            await new Promise(res => setTimeout(res, speed));
        }
        lockInput(false);
    }

    function lockInput(lock) {
        isTyping = lock;
        input.disabled = lock;
        if (!lock) input.focus();
    }

    input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !isTyping) {
            const val = input.value.trim();
            handleSequence(val);
            input.value = "";
        }
    });

    async function handleSequence(val) {
        const currentPrompt = prompt.textContent;
        
        switch(currentState) {
            case "USERNAME":
                tempUser = val;
                await typePrint(`${currentPrompt} ${val}`, "user-entry");
                prompt.textContent = "Session Password:";
                currentState = "PASSWORD";
                break;

            case "PASSWORD":
                if (val.length === 0 || val.length > 20) {
                    await typePrint(`${currentPrompt} ${val}`, "error-msg");
                    await typePrint("ERROR: PASSWORD MUST BE 1-20 CHARACTERS.", "error-msg");
                    return;
                }
                localStorage.setItem('session_user', tempUser);
                localStorage.setItem('session_pass', val);
                await typePrint(`${currentPrompt} ${val}`, "user-entry");
                await initSessionCreated();
                break;

            case "MODE_SELECT":
                const mode = val.toUpperCase();
                const validModes = ['R', 'B', 'A', 'PR', 'PB'];
                await typePrint(`${currentPrompt} ${val}`, "user-entry");

                if (!validModes.includes(mode)) {
                    await typePrint(`INVALID INPUT: ${mode}. RE-SPECIFY MODE.`, "error-msg");
                    return;
                }
                
                if (mode === 'PR' || mode === 'PB') {
                    await generateGameId(mode);
                } else {
                    await typePrint(`CONNECTING TO PUBLIC LOBBY AS [${mode}]...`, "system-msg");
                }
                break;
        }
    }

    async function initSessionCreated() {
        await typePrint("Local Session created.", "success-msg");
        await typePrint("Type R if you want to play as Red, B if you want to play Blue, A for whatever color is available for a quick match in the public lobby. Or press PR(if you want a private match where you are red) or PB(if you want a private match where you are blue). You will receive a game ID which will expire in 24H.");
        prompt.textContent = ">";
        currentState = "MODE_SELECT";
    }

    async function generateGameId(mode) {
        const id = Array.from({length: 3}, () => Math.random().toString(36).substring(2, 6).toUpperCase()).join('-');
        const color = mode === 'PR' ? "RED" : "BLUE";
        
        await typePrint(`ALLOCATING PRIVATE BUFFER [SIDE: ${color}]...`, "system-msg");
        await typePrint(`GAME ID: ${id}`, "highlight");
        await typePrint("READY FOR TURN 01. INITIALIZING 157-DIGIT VECTOR...");
        
        currentState = "MATCH_START";
        prompt.textContent = "COMMAND:";
    }
</script>

</body>
</html>
