<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KHET_SQUARE_GRID_OS</title>
    <style>
        @font-face {
            font-family: 'Unifont';
            src: url('unifont-15.0.01.ttf') format('truetype');
            font-display: block;
        }

        body { 
            background: #000; 
            color: #0f0; 
            font-family: 'Unifont', monospace; 
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #terminal {
            background: #050505;
            padding: 10px;
            border: 1px solid #333;
            display: inline-block;
        }

        /* The Grid Container */
        pre {
            font-size: 24px;
            line-height: 1;
            margin: 0;
            font-family: 'Unifont', monospace;
        }

        /* Force every unit into a perfect square */
        .u {
            display: inline-block;
            width: 24px;  /* Equal to font-size */
            height: 24px; /* Equal to font-size */
            text-align: center;
            line-height: 24px;
            vertical-align: middle;
        }

        .b { color: #00d4ff; }
        .r { color: #ff3333; }
        .d { color: #222; }
        
        .input-area {
            margin-top: 15px;
            width: 100%;
            max-width: 600px;
        }

        input {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            color: #0f0;
            padding: 8px;
            font-family: 'Unifont', monospace;
            outline: none;
            font-size: 16px;
        }

        .status-bar { 
            display: flex; 
            justify-content: space-between; 
            width: 100%; 
            max-width: 600px; 
            color: #444; 
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div id="terminal">
    <pre id="screen">_</pre>
</div>

<div class="input-area">
    <input type="text" id="raw-input" placeholder="INPUT_DATA" autocomplete="off" oninput="processInput()">
    <div class="status-bar">
        <span id="turn-info">T:--</span>
        <span id="digit-count">L:0</span>
    </div>
</div>

<script>
    const screen = document.getElementById('screen');
    const inputField = document.getElementById('raw-input');
    const counter = document.getElementById('digit-count');
    const turnInfo = document.getElementById('turn-info');

    const getSymbol = (type, rot) => {
        const r = rot % 4;
        switch(type) {
            case 0: case 5: return "◈"; 
            case 1: case 6: return ["⫝", "⟜", "Ͳ", "Ð"][r]; 
            case 2: case 7: return (r % 2 === 0) ? "⟋" : "⟍"; 
            case 3: case 8: return ["⬒", "◨", "⬓", "◧"][r]; 
            case 4: case 9: return ["◤", "◥", "◢", "◣"][r]; 
            default: return "?";
        }
    };

    function processInput() {
        const raw = inputField.value.trim().replace(/\s/g, '');
        counter.innerText = `L:${raw.length}`;
        
        if (raw.length === 0) {
            screen.innerHTML = "_";
            turnInfo.innerHTML = "T:--";
            return;
        }

        const grid = Array(8).fill(0).map(() => Array(10).fill(null));
        const pieceCount = Math.floor(raw.length / 6);

        for (let i = 0; i < pieceCount; i++) {
            const block = raw.substr(i * 6, 6);
            const type = parseInt(block[1]);
            const x    = parseInt(block[2]);
            const y    = parseInt(block[3]);
            const r    = parseInt(block[4]);

            if (y < 8 && x < 10 && !isNaN(type)) {
                const side = (type <= 4) ? "b" : "r";
                grid[y][x] = { char: getSymbol(type, r), side: side };
            }
        }

        let out = "<span class='u'> </span>"; // Corner spacer
        for(let i=0; i<10; i++) out += `<span class='u'>${i}</span>`;
        out += "\n";

        for (let y = 7; y >= 0; y--) {
            out += `<span class='u'>${y}</span>`; // Y label
            for (let x = 0; x < 10; x++) {
                const cell = grid[y][x];
                if (cell) {
                    out += `<span class="u ${cell.side}">${cell.char}</span>`;
                } else {
                    out += `<span class="u d">·</span>`;
                }
            }
            out += "\n";
        }

        if (raw.length >= 157) {
            const turnDigit = raw.substr(156, 1);
            turnInfo.innerHTML = `T:${turnDigit === "0" ? '<span class="b">BLUE</span>' : '<span class="r">RED</span>'}`;
        } else {
            turnInfo.innerHTML = "T:--";
        }
        
        screen.innerHTML = out;
    }
</script>
</body>
</html>
