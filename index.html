<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KHET_CLI_RAW_V11</title>
    <style>
        @font-face {
            font-family: 'Unifont';
            src: url('unifont-15.0.01.ttf') format('truetype');
            font-display: block;
        }

        body { 
            background: #000; 
            color: #0c0; /* Terminal Green */
            font-family: 'Unifont', monospace; 
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        #terminal {
            background: #000;
            padding: 10px;
            border: 1px solid #222; /* Dim border */
            display: inline-block;
        }

        /* STRICT DOT MATRIX GRID */
        .grid-row {
            display: flex;
            height: 32px;
        }

        .u {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            overflow: hidden;
            font-size: 24px;
        }

        /* PIECE COLORS - RAW */
        .b { color: #00d4ff; } 
        .r { color: #ff3333; } 
        .d { color: #222; } /* Empty Cell Dots */
        .label { color: #444; font-size: 18px; } 
        
        /* Scaling Normalization (Kept to prevent visual jitter) */
        .type-laser { font-family: sans-serif; font-weight: bold; transform: scale(1.1); }
        .type-switch { font-weight: bold; transform: scale(1.2); }
        .type-defender { transform: scale(1.05); }
        .type-deflector { transform: scale(1.1); }
        
        .err { 
            color: #000; 
            background: #0c0; /* Inverted terminal color for errors */
            font-weight: bold; 
        }

        .input-area {
            margin-top: 25px;
            width: 100%;
            max-width: 800px;
        }

        input {
            width: 100%;
            background: #000;
            border: 1px solid #0c0;
            color: #0c0;
            padding: 12px;
            font-family: 'Unifont', monospace;
            outline: none;
            font-size: 18px;
            box-sizing: border-box;
        }

        .status-bar { 
            display: flex; 
            justify-content: space-between; 
            width: 100%; 
            color: #444; 
            font-size: 14px;
            margin-top: 10px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="terminal">
    <div id="screen">_</div>
</div>

<div class="input-area">
    <input type="text" id="raw-input" value="04001 55701 19011 60731 24311 25321 74421 75411 84711 86711 33031 35031 92621 47141 43531 96211 42421 42331 90441 90311 97411 97341 49431 49321 0" autocomplete="off" oninput="processInput()">
    <div class="status-bar">
        <span id="turn-info">SYSTEM: IDLE</span>
        <span id="digit-count">LEN: 0</span>
    </div>
</div>

<script>
    const screen = document.getElementById('screen');
    const inputField = document.getElementById('raw-input');
    const counter = document.getElementById('digit-count');
    const turnInfo = document.getElementById('turn-info');

    // UNCHANGED ASCII SET AS REQUESTED
    const getSymbolData = (type, r) => {
        switch(type) {
            case 0: case 5: return { char: "◈", class: "type-king" }; 
            case 1: case 6: 
                if (r === 1) return { char: "⫝", class: "type-laser" };
                if (r === 2) return { char: "⟜", class: "type-laser" };
                if (r === 3) return { char: "Ͳ", class: "type-laser" };
                if (r === 4) return { char: "Ð", class: "type-laser" };
                return { char: "!", class: "err" };
            case 2: case 7: 
                if (r === 1 || r === 3) return { char: "⟋", class: "type-switch" };
                if (r === 2 || r === 4) return { char: "⟍", class: "type-switch" };
                return { char: "!", class: "err" };
            case 3: case 8: 
                if (r === 1) return { char: "⬒", class: "type-defender" };
                if (r === 2) return { char: "◨", class: "type-defender" };
                if (r === 3) return { char: "⬓", class: "type-defender" };
                if (r === 4) return { char: "◧", class: "type-defender" };
                return { char: "!", class: "err" };
            case 4: case 9: 
                if (r === 1) return { char: "◤", class: "type-deflector" };
                if (r === 2) return { char: "◥", class: "type-deflector" };
                if (r === 3) return { char: "◢", class: "type-deflector" };
                if (r === 4) return { char: "◣", class: "type-deflector" };
                return { char: "!", class: "err" };
            default: return { char: "?", class: "err" }; 
        }
    };

    function processInput() {
        const raw = inputField.value.trim().replace(/\s/g, '');
        counter.innerText = `LEN: ${raw.length}`;
        
        const grid = Array(8).fill(0).map(() => Array(10).fill(null));
        const pieces = Math.floor(raw.length / 5);

        for (let i = 0; i < pieces; i++) {
            const b = raw.substr(i * 5, 5);
            const t = parseInt(b[0], 10), x = parseInt(b[1], 10), y = parseInt(b[2], 10), r = parseInt(b[3], 10), s = parseInt(b[4], 10);
            if (s === 1 && y < 8 && x < 10) {
                const sym = getSymbolData(t, r);
                const side = t <= 4 ? "b" : "r";
                if (grid[y][x]) grid[y][x] = { char: "X", class: "err", side: "err" };
                else grid[y][x] = { ...sym, side };
            }
        }

        let html = '<div class="grid-row"><span class="u label"> </span>';
        for(let i=0; i<10; i++) html += `<span class="u label">${i}</span>`;
        html += '</div>';

        for (let y = 7; y >= 0; y--) {
            html += `<div class="grid-row"><span class="u label">${y}</span>`;
            for (let x = 0; x < 10; x++) {
                const c = grid[y][x];
                if (c) html += `<span class="u ${c.side} ${c.class}">${c.char}</span>`;
                else html += `<span class="u d">·</span>`;
            }
            html += '</div>';
        }

        if (raw.length % 5 === 1) {
            const turn = raw.slice(-1);
            turnInfo.innerHTML = `STATUS: <span class="${turn==='0'?'b':'r'}">${turn==='0'?'BLUE':'RED'}_READY</span>`;
        } else { turnInfo.innerHTML = "STATUS: IDLE"; }
        
        screen.innerHTML = html;
    }
    processInput();
</script>
</body>
</html>
