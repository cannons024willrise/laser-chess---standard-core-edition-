<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KHET_OS_V5_STRICT</title>
    <style>
        @font-face {
            font-family: 'Unifont';
            src: url('unifont-15.0.01.ttf') format('truetype');
            font-display: block;
        }

        body { 
            background: #000; 
            color: #0f0; 
            font-family: 'Unifont', monospace; 
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #terminal {
            background: #050505;
            padding: 10px;
            border: 1px solid #333;
            display: inline-block;
        }

        pre {
            font-size: 24px;
            line-height: 1;
            margin: 0;
            font-family: 'Unifont', monospace;
        }

        .u {
            display: inline-block;
            width: 24px;
            height: 24px;
            text-align: center;
            line-height: 24px;
            vertical-align: middle;
        }

        .b { color: #00d4ff; } /* BLUE/SILVER (0-4) */
        .r { color: #ff3333; } /* RED (5-9) */
        .d { color: #222; }    /* EMPTY */
        
        .input-area {
            margin-top: 15px;
            width: 100%;
            max-width: 650px;
        }

        input {
            width: 100%;
            background: #111;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 10px;
            font-family: 'Unifont', monospace;
            outline: none;
            font-size: 16px;
        }

        .status-bar { 
            display: flex; 
            justify-content: space-between; 
            width: 100%; 
            color: #444; 
            font-size: 14px;
            margin-top: 5px;
        }
        #debug { color: #333; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="terminal">
    <pre id="screen">READY_FOR_DATA_STREAM...</pre>
</div>

<div class="input-area">
    <input type="text" id="raw-input" placeholder="PASTE: TYPE-X-Y-ROT-STAT..." autocomplete="off" oninput="processInput()">
    <div class="status-bar">
        <span id="turn-info">T:--</span>
        <span id="digit-count">L:0</span>
    </div>
    <div id="debug"></div>
</div>

<script>
    const screen = document.getElementById('screen');
    const inputField = document.getElementById('raw-input');
    const counter = document.getElementById('digit-count');
    const turnInfo = document.getElementById('turn-info');
    const debug = document.getElementById('debug');

    const getSymbol = (type, rot) => {
        const r = rot % 4;
        switch(type) {
            case 0: case 5: return "◈"; // King
            case 1: case 6: return ["⫝", "⟜", "Ͳ", "Ð"][r]; // Laser
            case 2: case 7: return (r % 2 === 0) ? "⟋" : "⟍"; // Switch
            case 3: case 8: return ["⬒", "◨", "⬓", "◧"][r]; // Defender
            case 4: case 9: return ["◤", "◥", "◢", "◣"][r]; // Deflector
            default: return "?";
        }
    };

    function processInput() {
        const raw = inputField.value.trim().replace(/\s/g, '');
        counter.innerText = `L:${raw.length}`;
        
        if (raw.length < 5) {
            screen.innerHTML = "AWAITING_FULL_PIECE_BLOCK...";
            return;
        }

        const grid = Array(8).fill(0).map(() => Array(10).fill(null));
        const pieceCount = Math.floor(raw.length / 5);

        for (let i = 0; i < pieceCount; i++) {
            const block = raw.substr(i * 5, 5);
            
            // STRICT MAPPING: TYPE(0) X(1) Y(2) R(3) S(4)
            const type = parseInt(block[0]); 
            const x    = parseInt(block[1]); 
            const y    = parseInt(block[2]); 
            const r    = parseInt(block[3]); 

            if (i === 0) {
                debug.innerText = `DEBUG PIECE 0: TYPE=${type} X=${x} Y=${y} R=${r}`;
            }

            if (!isNaN(x) && !isNaN(y) && y < 8 && x < 10) {
                const side = (type <= 4) ? "b" : "r";
                grid[y][x] = { char: getSymbol(type, r), side: side };
            }
        }

        let out = "<span class='u'> </span>";
        for(let i=0; i<10; i++) out += `<span class='u'>${i}</span>`;
        out += "\n";

        for (let y = 7; y >= 0; y--) {
            out += `<span class='u'>${y}</span>`;
            for (let x = 0; x < 10; x++) {
                const cell = grid[y][x];
                if (cell) {
                    out += `<span class="u ${cell.side}">${cell.char}</span>`;
                } else {
                    out += `<span class="u d">·</span>`;
                }
            }
            out += "\n";
        }

        // 26 pieces * 5 digits = 130 digits. Turn is digit 131.
        if (raw.length >= 131) {
            const turnDigit = raw.substr(130, 1);
            turnInfo.innerHTML = `T:${turnDigit === "0" ? '<span class="b">BLUE</span>' : '<span class="r">RED</span>'}`;
        } else {
            turnInfo.innerHTML = "T:--";
        }
        
        screen.innerHTML = out;
    }
</script>
</body>
</html>
