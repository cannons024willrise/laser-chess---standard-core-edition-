<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Laser Chess - Standard Version (Core Edition)</title>
    <style>
        @font-face {
            font-family: 'Unifont';
            src: url('unifont-15.0.01.ttf') format('truetype');
        }

        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            color: #b0b0b0; font-family: 'Unifont', monospace;
            font-size: 16px; margin: 0; padding: 30px; line-height: 1.6;
        }

        #terminal-log { display: flex; flex-direction: column; }
        .input-wrapper { display: flex; align-items: baseline; margin-top: 5px; }
        .user-input-line {
            background: transparent; border: none; color: #00ff00;
            font-family: 'Unifont', monospace; font-size: 16px;
            outline: none; flex-grow: 1; margin-left: 8px; caret-color: #00ff00;
        }

        .system-msg { color: #666; margin-bottom: 5px; }
        .success-msg { color: #00ff00; font-weight: bold; }
        .error-msg { color: #ff5555; }
        .highlight { color: #ffffff; margin-bottom: 10px; }
        .rules-link { color: #4444ff; text-decoration: underline; font-weight: bold; }
    </style>
</head>
<body>

<div id="terminal-log"></div>

<script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBuT7P1iTdXcZW-y05DX-kseuLrPGmaWSs",
        authDomain: "laserchess-web-free.firebaseapp.com",
        databaseURL: "https://laserchess-web-free-default-rtdb.firebaseio.com",
        projectId: "laserchess-web-free",
        storageBucket: "laserchess-web-free.firebasestorage.app",
        messagingSenderId: "887464510754",
        appId: "1:887464510754:web:aee6938681543602a4517b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const log = document.getElementById('terminal-log');
    let currentState = "USERNAME";
    let tempUser = "";

    function addToQueue(text, className = "", isRequest = false) {
        if (isRequest) {
            const wrapper = document.createElement('div');
            wrapper.className = "input-wrapper";
            const label = document.createElement('span');
            label.textContent = text;
            const input = document.createElement('input');
            input.type = "text";
            input.className = "user-input-line";
            input.maxLength = 20;
            wrapper.appendChild(label);
            wrapper.appendChild(input);
            log.appendChild(wrapper);
            input.focus();
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    const val = input.value.trim();
                    input.disabled = true;
                    handleStateLogic(val);
                }
            });
        } else {
            const line = document.createElement('div');
            line.className = className;
            line.innerHTML = text;
            log.appendChild(line);
        }
        window.scrollTo(0, document.body.scrollHeight);
    }

    function handleStateLogic(val) {
        if (currentState === "USERNAME") {
            if (val.length === 0) return addToQueue("Username required:", "error-msg", true);
            tempUser = val;
            currentState = "PASSWORD";
            addToQueue("Session Password (max 20):", "", true);
        } else if (currentState === "PASSWORD") {
            if (val.length === 0) return addToQueue("Password required:", "error-msg", true);
            registerBranchA(tempUser, val);
        }
    }

    function registerBranchA(u, p) {
        addToQueue("TRANSMITTING TO BRANCH A...", "system-msg");
        const branchAData = {
            password: p,
            lastplayed: Math.floor(Date.now())
        };

        db.ref('a/' + u).set(branchAData).then(() => {
            localStorage.setItem('session_user', u);
            localStorage.setItem('session_pass', p);
            addToQueue("IDENTITY ESTABLISHED. BRANCH A LOCKED.", "success-msg");
        }).catch(err => {
            addToQueue("IDENTITY CONFLICT: USERNAME TAKEN.", "error-msg");
            currentState = "USERNAME";
            addToQueue("Session Username (max 20):", "", true);
        });
    }

    window.onload = () => {
        addToQueue("Laser Chess Standard - Free Core Edition", "highlight");
        addToQueue('This is a site for Laser Chess Standard for free. Here are the <a href="https://www.youtube.com/watch?v=UqLa-LOficM&t=53s" class="rules-link" target="_blank">rules</a>.', "system-msg");
        addToQueue("Note: Due to limitations, threefold repetition won't be used.", "system-msg");
        
        addToQueue("IDENTITY NOTICE:", "highlight");
        addToQueue("This is a temporary identity. It is deleted 24H after its last move.", "system-msg");
        addToQueue("No ratings or long-term stats are stored.", "system-msg");
        
        addToQueue("Session Username (max 20):", "", true);
    };
</script>
</body>
</html>
