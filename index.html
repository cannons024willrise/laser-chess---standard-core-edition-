<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Laser Chess Standard - Standard Variant(Core Edition)</title>
    <style>
        @font-face {
            font-family: 'Unifont';
            src: url('./unifont.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            color: #b0b0b0; 
            font-family: 'Unifont', monospace;
            image-rendering: pixelated;
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: grayscale;
            margin: 0;
            padding: 30px;
            overflow: hidden;
        }

        #terminal-log {
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .input-wrapper {
            display: inline-flex;
            width: 100%;
            align-items: baseline;
        }

        .user-input-line {
            background: transparent;
            border: none;
            color: #ffffff;
            font-family: 'Unifont', monospace;
            font-size: inherit;
            outline: none;
            flex-grow: 1;
            margin-left: 8px;
            padding: 0;
        }

        .user-input-line:disabled {
            caret-color: transparent;
            cursor: default;
        }

        /* Dynamic Color Highlights */
        .txt-red { color: #ff4444; font-weight: bold; }
        .txt-blue { color: #4444ff; font-weight: bold; }

        .system-msg { color: #555555; display: block; }
        .success-msg { color: #888888; font-weight: bold; display: block; }
        .error-msg { color: #ff5555; display: block; }
        .highlight { color: #ffffff; display: block; }
        .history-line { display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="terminal-log"></div>

<script>
    const log = document.getElementById('terminal-log');
    let msgQueue = [];
    let isProcessing = false;
    let currentState = "INIT";
    let tempUser = "";

    // Helper to colorize specific words within a string
    function colorize(text) {
        return text.replace(/(red|blue)/gi, (match) => {
            const cls = match.toLowerCase() === 'red' ? 'txt-red' : 'txt-blue';
            return `<span class="${cls}">${match}</span>`;
        });
    }

    function addToQueue(text, className = "", isRequest = false) {
        msgQueue.push({ text, className, isRequest });
        if (!isProcessing) processQueue();
    }

    async function processQueue() {
        isProcessing = true;
        while (msgQueue.length > 0) {
            const item = msgQueue.shift();
            if (item.isRequest) {
                await typeLineInline(item.text, item.className);
            } else {
                await typeLineSimple(item.text, item.className);
            }
        }
        isProcessing = false;
    }

    // Types text char by char, then applies the color spans at the end of the line
    function typeLineSimple(text, className) {
        return new Promise((resolve) => {
            const div = document.createElement('div');
            div.className = className + " history-line";
            log.appendChild(div);
            let i = 0;
            const timer = setInterval(() => {
                if (i < text.length) {
                    div.textContent += text.charAt(i);
                    i++;
                } else {
                    clearInterval(timer);
                    // Apply HTML coloring after raw text typing is done
                    div.innerHTML = colorize(div.textContent);
                    resolve();
                }
            }, 30);
        });
    }

    function typeLineInline(text, className) {
        return new Promise((resolve) => {
            const wrapper = document.createElement('div');
            wrapper.className = "input-wrapper history-line " + className;
            const label = document.createElement('span');
            wrapper.appendChild(label);
            const input = document.createElement('input');
            input.type = "text";
            input.className = "user-input-line";
            input.autocomplete = "off";
            input.spellcheck = false;
            input.disabled = true; 
            wrapper.appendChild(input);
            log.appendChild(wrapper);

            let i = 0;
            const timer = setInterval(() => {
                if (i < text.length) {
                    label.textContent += text.charAt(i);
                    i++;
                } else {
                    clearInterval(timer);
                    label.innerHTML = colorize(label.textContent);
                    input.disabled = false;
                    input.focus();
                    const handleEnter = (e) => {
                        if (e.key === 'Enter') {
                            const val = input.value.trim();
                            input.disabled = true;
                            input.removeEventListener('keydown', handleEnter);
                            handleStateLogic(val);
                            resolve();
                        }
                    };
                    input.addEventListener('keydown', handleEnter);
                }
            }, 35);
        });
    }

    function handleStateLogic(val) {
        switch(currentState) {
            case "USERNAME":
                tempUser = val;
                currentState = "PASSWORD";
                addToQueue("Session Password:", "", true);
                break;
            case "PASSWORD":
                if (val.length === 0 || val.length > 20) {
                    addToQueue("ERROR: PASSWORD MUST BE 1-20 CHARACTERS.", "error-msg");
                    addToQueue("Session Password:", "", true);
                    return;
                }
                localStorage.setItem('session_user', tempUser);
                localStorage.setItem('session_pass', val);
                initSessionCreated();
                break;
            case "MODE_SELECT":
                processGameStart(val.toUpperCase());
                break;
        }
    }

    function processGameStart(choice) {
        addToQueue(`INITIALIZING MODE: ${choice}...`, "system-msg");
    }

    window.onload = () => {
        const storedUser = localStorage.getItem('session_user');
        const storedPass = localStorage.getItem('session_pass');
        addToQueue("Welcome to Laser Chess Online (Core Edition) - Standard Variant!", "highlight");
        if (storedUser && storedPass) {
            addToQueue(`RETURNING OPERATOR: ${storedUser}`, "system-msg");
            addToQueue(`Session Username: ${storedUser}`);
            addToQueue(`Session Password: ${storedPass}`);
            initSessionCreated();
        } else {
            addToQueue("--- NEW SESSION INITIALIZED ---", "system-msg");
            currentState = "USERNAME";
            addToQueue("Session Username:", "", true);
        }
    };

    function initSessionCreated() {
        addToQueue("Local Session created.", "success-msg");
        addToQueue("R: Play as Red (Public Lobby)");
        addToQueue("B: Play as Blue (Public Lobby)");
        addToQueue("A: Quick Match (Any available color)");
        addToQueue("PR: Private Match (You are Red)");
        addToQueue("PB: Private Match (You are Blue)");
        addToQueue("Private matches generate a 24H Game ID.");
        addToQueue("Choose Mode [R/B/A/PR/PB]:", "", true);
        currentState = "MODE_SELECT";
    }
</script>

</body>
</html>
