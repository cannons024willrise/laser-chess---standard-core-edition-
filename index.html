<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laser Chess - Core Edition</title>
    <style>
        body {
            background: #0a0a0a;
            color: #b0b0b0; 
            font-family: 'Courier New', monospace; /* Fallback to prevent blank screen */
            font-size: 16px; 
            margin: 0; padding: 20px; 
            line-height: 1.4;
        }

        #terminal-log { display: flex; flex-direction: column; }
        .input-wrapper { display: flex; align-items: baseline; margin-top: 5px; }
        
        .user-input-line {
            background: transparent; border: none; color: #ffffff;
            font-family: inherit; font-size: 16px;
            outline: none; flex-grow: 1; margin-left: 8px;
        }

        .system-msg { color: #666; }
        .success-msg { color: #00ff00; font-weight: bold; }
        .error-msg { color: #ff5555; }
        .highlight { color: #ffffff; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="terminal-log"></div>

<script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBuT7P1iTdXcZW-y05DX-kseuLrPGmaWSs",
        authDomain: "laserchess-web-free.firebaseapp.com",
        databaseURL: "https://laserchess-web-free-default-rtdb.firebaseio.com",
        projectId: "laserchess-web-free",
        storageBucket: "laserchess-web-free.firebasestorage.app",
        messagingSenderId: "887464510754",
        appId: "1:887464510754:web:aee6938681543602a4517b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const SERVER_TIMESTAMP = firebase.database.ServerValue.TIMESTAMP;
    const INIT_STATE = "0400155701190116073124311253217442175411847118671133031350319262147141435319621142421423319044190311974119734149431493210";

    const log = document.getElementById('terminal-log');
    let currentState = "USERNAME";
    let activeQueueMatch = null;

    function print(text, className = "") {
        const div = document.createElement('div');
        div.className = className;
        div.innerHTML = text;
        log.appendChild(div);
        window.scrollTo(0, document.body.scrollHeight);
    }

    function ask(text, callback) {
        const wrapper = document.createElement('div');
        wrapper.className = "input-wrapper";
        wrapper.innerHTML = `<span>${text}</span><input type="text" class="user-input-line">`;
        log.appendChild(wrapper);
        const input = wrapper.querySelector('input');
        input.focus();
        window.scrollTo(0, document.body.scrollHeight);

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const val = input.value.trim().toUpperCase();
                input.disabled = true;
                callback(val);
            }
        });
    }

    function handleInput(val) {
        if (currentState === "USERNAME") {
            if (!val) { print("Username required.", "error-msg"); startFlow(); return; }
            localStorage.setItem('session_user', val);
            currentState = "PASSWORD";
            startFlow();
        } else if (currentState === "PASSWORD") {
            if (!val) { print("Password required.", "error-msg"); startFlow(); return; }
            localStorage.setItem('session_pass', val);
            startLobbySync();
        } else if (currentState === "MODE_SELECT") {
            processAction(val);
        }
    }

    function startLobbySync() {
        currentState = "MODE_SELECT";
        db.ref('fifo_enforcer').orderByKey().limitToFirst(1).on('value', snap => {
            if (snap.exists()) {
                let mId, et;
                snap.forEach(c => { mId = c.key; et = c.val().et; });
                db.ref(`matches/${mId}/public_data`).once('value', pSnap => {
                    activeQueueMatch = { id: mId, et: et, data: pSnap.val() };
                    renderMenu();
                });
            } else {
                activeQueueMatch = null;
                renderMenu();
            }
        });
    }

    function renderMenu() {
        print("--- LOBBY STATUS ---", "system-msg");
        if (activeQueueMatch) {
            const side = activeQueueMatch.data.rn ? "RED" : "BLUE";
            print(`PENDING: ${activeQueueMatch.id} [${side}]`, "highlight");
            print("[A] JOIN OPPOSITE | [R] CREATE RED | [B] CREATE BLUE", "system-msg");
        } else {
            print("QUEUE EMPTY.", "system-msg");
            print("[R] CREATE RED | [B] CREATE BLUE", "system-msg");
        }
        ask("CMD> ", handleInput);
    }

    function processAction(cmd) {
        const u = localStorage.getItem('session_user');
        const p = localStorage.getItem('session_pass');

        if (cmd === "A" && activeQueueMatch) {
            const joinColor = activeQueueMatch.data.rn ? 0 : 1;
            join(activeQueueMatch.id, joinColor, u, p, activeQueueMatch.et);
        } else if (cmd === "R") {
            if (activeQueueMatch && activeQueueMatch.data.rn) {
                print("ERROR: RED PENDING. USE [A] TO JOIN AS BLUE.", "error-msg");
                renderMenu();
            } else {
                create(1, u, p);
            }
        } else if (cmd === "B") {
            if (activeQueueMatch && activeQueueMatch.data.bn) {
                print("ERROR: BLUE PENDING. USE [A] TO JOIN AS RED.", "error-msg");
                renderMenu();
            } else {
                create(0, u, p);
            }
        } else {
            print("INVALID COMMAND.", "error-msg");
            renderMenu();
        }
    }

    function create(color, u, p) {
        const id = Date.now().toString();
        const et = Math.random().toString(36).substr(2, 9);
        const upd = {};
        upd[`fifo_enforcer/${id}/et`] = et;
        upd[`matches/${id}/public_data/gamestate`] = INIT_STATE;
        upd[`matches/${id}/public_data/${color === 1 ? 'rn' : 'bn'}`] = u;
        upd[`matches/${id}/private_tokens/et`] = et;
        upd[`matches/${id}/private_tokens/${color === 1 ? 'redpassword' : 'bluepassword'}`] = p;

        db.ref().update(upd).then(() => print(`MATCH ${id} CREATED.`, "success-msg"));
    }

    function join(id, color, u, p, et) {
        const upd = {};
        upd[`fifo_enforcer/${id}`] = null;
        upd[`matches/${id}/public_data/${color === 1 ? 'rn' : 'bn'}`] = u;
        upd[`matches/${id}/private_tokens/et`] = et;
        upd[`matches/${id}/private_tokens/${color === 1 ? 'redpassword' : 'bluepassword'}`] = p;

        db.ref().update(upd).then(() => print(`JOINED ${id}.`, "success-msg"))
          .catch(() => print("HANDSHAKE FAILED.", "error-msg"));
    }

    function startFlow() {
        const u = localStorage.getItem('session_user');
        const p = localStorage.getItem('session_pass');
        if (!u) ask("USERNAME: ", handleInput);
        else if (!p) ask("PASSWORD: ", handleInput);
        else startLobbySync();
    }

    window.onload = () => {
        print("LASER CHESS CORE v1.0.4", "highlight");
        startFlow();
    };
</script>
</body>
</html>
