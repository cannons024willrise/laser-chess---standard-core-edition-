<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Laser Chess Standard - Core Edition</title>
    <style>
        @font-face {
            font-family: 'Unifont';
            src: url('unifont-15.0.01.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            background: #0a0a0a;
            color: #b0b0b0; 
            font-family: 'Unifont', monospace;
            font-size: 16px;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        #terminal-log {
            flex-grow: 1;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .input-line {
            display: flex;
            align-items: center;
            margin-top: 5px;
        }

        .prompt { color: #ffffff; margin-right: 10px; }

        #user-input {
            background: transparent;
            border: none;
            color: #00ff00; /* Phosphor green input */
            font-family: 'Unifont', monospace;
            font-size: 16px;
            outline: none;
            flex-grow: 1;
        }

        .txt-red { color: #ff4444; }
        .txt-blue { color: #4444ff; }
        .system-msg { color: #555555; }
        .success { color: #00ff00; }
        .highlight { color: #ffffff; }
    </style>
</head>
<body>

<div id="terminal-log"></div>
<div class="input-line" id="input-container" style="display:none;">
    <span class="prompt" id="current-prompt"></span>
    <input type="text" id="user-input" autocomplete="off" spellcheck="false">
</div>

<script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.10.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBuT7P1iTdXcZW-y05DX-kseuLrPGmaWSs",
        authDomain: "laserchess-web-free.firebaseapp.com",
        databaseURL: "https://laserchess-web-free-default-rtdb.firebaseio.com",
        projectId: "laserchess-web-free",
        storageBucket: "laserchess-web-free.firebasestorage.app",
        messagingSenderId: "887464510754",
        appId: "1:887464510754:web:aee6938681543602a4517b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const log = document.getElementById('terminal-log');
    const inputContainer = document.getElementById('input-container');
    const userInput = document.getElementById('user-input');
    const promptSpan = document.getElementById('current-prompt');

    let currentState = "USERNAME";
    let tempUser = "";
    let tempMode = "";

    function write(text, style = "") {
        const div = document.createElement('div');
        div.className = style;
        // Colorize red/blue automatically
        div.innerHTML = text.replace(/(red|blue)/gi, '<span class="txt-$1">$1</span>');
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }

    function ask(promptText) {
        inputContainer.style.display = 'flex';
        promptSpan.textContent = promptText;
        userInput.value = "";
        userInput.focus();
    }

    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const val = userInput.value.trim();
            inputContainer.style.display = 'none';
            write(`${promptSpan.textContent} ${val}`, "highlight");
            handleLogic(val);
        }
    });

    function handleLogic(val) {
        switch(currentState) {
            case "USERNAME":
                tempUser = val;
                currentState = "PASSWORD";
                ask("Session Password:");
                break;
            case "PASSWORD":
                localStorage.setItem('session_user', tempUser);
                localStorage.setItem('session_pass', val);
                write("Local Session Established.", "success");
                write("Modes: PR (Private Red) | PB (Private Blue)");
                currentState = "MODE_SELECT";
                ask("Choose Mode:");
                break;
            case "MODE_SELECT":
                tempMode = val.toUpperCase();
                currentState = "UUID_INPUT";
                ask("Enter 24H Game UUID:");
                break;
            case "UUID_INPUT":
                performHandshake(val);
                break;
        }
    }

    function performHandshake(uuid) {
        const isRed = (tempMode === 'PR' || tempMode === 'R');
        const passKey = isRed ? 'passwordred' : 'passwordblue';
        const userKey = isRed ? 'usernamered' : 'usernameblue';

        write(`Contacting sub-node: ${passKey.toUpperCase()}...`, "system-msg");

        db.ref('games/' + uuid).once('value').then(snap => {
            if (snap.exists()) {
                const data = snap.val();
                if (data[passKey] === localStorage.getItem('session_pass')) {
                    write("HANDSHAKE SUCCESS.", "success");
                    write("GAMELOG: " + data.gamestate.substring(0, 40) + "...", "highlight");
                } else {
                    write("AUTH_DENIED: Check UUID or Password.", "error-msg");
                    ask("Enter 24H Game UUID:");
                }
            } else {
                write("ERROR: UUID not found.", "error-msg");
                ask("Enter 24H Game UUID:");
            }
        });
    }

    // Immediate start
    window.onload = () => {
        write("Laser Chess Core Edition v1.0", "highlight");
        write("---", "system-msg");
        ask("Session Username:");
    };
</script>
</body>
</html>
