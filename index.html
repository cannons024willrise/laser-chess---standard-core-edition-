<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Laser Chess Standard - Standard Variant (Core Edition)</title>
    <style>
        @font-face {
            font-family: 'Unifont';
            /* Pointing to your local file to avoid decoding errors */
            src: url('./unifont-15.0.01.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
            color: #b0b0b0; 
            font-family: 'Unifont', monospace;
            font-size: 16px; /* Native Unifont resolution */
            image-rendering: pixelated;
            -webkit-font-smoothing: none;
            -moz-osx-font-smoothing: grayscale;
            margin: 0;
            padding: 30px;
            overflow-y: auto; /* Changed to auto to handle long terminal logs */
            height: 100vh;
            box-sizing: border-box;
        }

        #terminal-log {
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .input-wrapper {
            display: inline-flex;
            width: 100%;
            align-items: baseline;
        }

        .user-input-line {
            background: transparent;
            border: none;
            color: #ffffff;
            font-family: 'Unifont', monospace;
            font-size: inherit;
            outline: none;
            flex-grow: 1;
            margin-left: 8px;
            padding: 0;
        }

        .user-input-line:disabled {
            caret-color: transparent;
            cursor: default;
        }

        /* Dynamic Color Highlights */
        .txt-red { color: #ff4444; font-weight: bold; }
        .txt-blue { color: #4444ff; font-weight: bold; }

        .system-msg { color: #555555; display: block; }
        .success-msg { color: #00ff00; font-weight: bold; display: block; } /* Greener for success */
        .error-msg { color: #ff5555; display: block; }
        .highlight { color: #ffffff; display: block; }
        .history-line { display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="terminal-log"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // Initialize Firebase (Paste your actual config here)
    const firebaseConfig = {
        databaseURL: "YOUR_DATABASE_URL"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const log = document.getElementById('terminal-log');
    let msgQueue = [];
    let isProcessing = false;
    let currentState = "INIT";
    let tempUser = "";
    let tempMode = "";

    function colorize(text) {
        return text.replace(/(red|blue)/gi, (match) => {
            const cls = match.toLowerCase() === 'red' ? 'txt-red' : 'txt-blue';
            return `<span class="${cls}">${match}</span>`;
        });
    }

    function addToQueue(text, className = "", isRequest = false) {
        msgQueue.push({ text, className, isRequest });
        if (!isProcessing) processQueue();
    }

    async function processQueue() {
        isProcessing = true;
        while (msgQueue.length > 0) {
            const item = msgQueue.shift();
            if (item.isRequest) {
                await typeLineInline(item.text, item.className);
            } else {
                await typeLineSimple(item.text, item.className);
            }
        }
        isProcessing = false;
    }

    function typeLineSimple(text, className) {
        return new Promise((resolve) => {
            const div = document.createElement('div');
            div.className = className + " history-line";
            log.appendChild(div);
            let i = 0;
            const timer = setInterval(() => {
                if (i < text.length) {
                    div.textContent += text.charAt(i);
                    i++;
                } else {
                    clearInterval(timer);
                    div.innerHTML = colorize(div.textContent);
                    window.scrollTo(0, document.body.scrollHeight);
                    resolve();
                }
            }, 15); // Faster typing for better UX
        });
    }

    function typeLineInline(text, className) {
        return new Promise((resolve) => {
            const wrapper = document.createElement('div');
            wrapper.className = "input-wrapper history-line " + className;
            const label = document.createElement('span');
            wrapper.appendChild(label);
            const input = document.createElement('input');
            input.type = "text";
            input.className = "user-input-line";
            input.autocomplete = "off";
            input.spellcheck = false;
            input.disabled = true; 
            wrapper.appendChild(input);
            log.appendChild(wrapper);

            let i = 0;
            const timer = setInterval(() => {
                if (i < text.length) {
                    label.textContent += text.charAt(i);
                    i++;
                } else {
                    clearInterval(timer);
                    label.innerHTML = colorize(label.textContent);
                    input.disabled = false;
                    input.focus();
                    const handleEnter = (e) => {
                        if (e.key === 'Enter') {
                            const val = input.value.trim();
                            input.disabled = true;
                            input.removeEventListener('keydown', handleEnter);
                            handleStateLogic(val);
                            resolve();
                        }
                    };
                    input.addEventListener('keydown', handleEnter);
                }
            }, 20);
        });
    }

    function handleStateLogic(val) {
        switch(currentState) {
            case "USERNAME":
                tempUser = val;
                currentState = "PASSWORD";
                addToQueue("Session Password:", "", true);
                break;
            case "PASSWORD":
                if (val.length === 0 || val.length > 20) {
                    addToQueue("ERROR: PASSWORD MUST BE 1-20 CHARACTERS.", "error-msg");
                    addToQueue("Session Password:", "", true);
                    return;
                }
                localStorage.setItem('session_user', tempUser);
                localStorage.setItem('session_pass', val);
                initSessionCreated();
                break;
            case "MODE_SELECT":
                const mode = val.toUpperCase();
                if (['PR', 'PB', 'R', 'B', 'A'].includes(mode)) {
                    tempMode = mode;
                    currentState = "UUID_INPUT";
                    addToQueue(`INITIALIZING MODE: ${mode}...`, "system-msg");
                    addToQueue("Enter 24H Game UUID:", "", true);
                } else {
                    addToQueue("ERROR: INVALID MODE.", "error-msg");
                    addToQueue("Choose Mode [R/B/A/PR/PB]:", "", true);
                }
                break;
            case "UUID_INPUT":
                authenticateMatch(val);
                break;
        }
    }

    function authenticateMatch(uuid) {
        const user = localStorage.getItem('session_user');
        const pass = localStorage.getItem('session_pass');
        
        // Logic: Determine which subnode param to check against
        const isRed = (tempMode === 'PR' || tempMode === 'R');
        const passTarget = isRed ? 'passwordred' : 'passwordblue';
        const userTarget = isRed ? 'usernamered' : 'usernameblue';

        addToQueue(`CONNECTING TO SUB-NODE: ${passTarget.toUpperCase()}...`, "system-msg");

        db.ref(`games/${uuid}`)
            .orderByChild(passTarget)
            .equalTo(pass)
            .once('value')
            .then(snap => {
                if (snap.exists()) {
                    const data = snap.val();
                    const actualData = data[Object.keys(data)[0]];
                    
                    if (actualData[userTarget] === user) {
                        addToQueue("HANDSHAKE SUCCESSFUL. RETRIEVING DATA...", "success-msg");
                        // This is your 157-digit gamestate
                        const state = actualData.gamestate;
                        addToQueue(`STATE_LOADED: ${state.substring(0, 10)}...[157 DIGITS]`, "system-msg");
                    } else {
                        addToQueue("CRITICAL ERROR: USERNAME MISMATCH FOR THIS NODE.", "error-msg");
                        addToQueue("Enter 24H Game UUID:", "", true);
                    }
                } else {
                    addToQueue("CRITICAL ERROR: INVALID UUID OR PASSWORD PARAMS.", "error-msg");
                    addToQueue("Enter 24H Game UUID:", "", true);
                }
            });
    }

    window.onload = () => {
        const storedUser = localStorage.getItem('session_user');
        const storedPass = localStorage.getItem('session_pass');
        addToQueue("Welcome to Laser Chess Online (Core Edition) - Standard Variant!", "highlight");
        if (storedUser && storedPass) {
            addToQueue(`RETURNING OPERATOR: ${storedUser}`, "system-msg");
            initSessionCreated();
        } else {
            addToQueue("--- NEW SESSION INITIALIZED ---", "system-msg");
            currentState = "USERNAME";
            addToQueue("Session Username:", "", true);
        }
    };

    function initSessionCreated() {
        addToQueue("Local Session established.", "success-msg");
        addToQueue("PR: Private Match (Red Slot)");
        addToQueue("PB: Private Match (Blue Slot)");
        addToQueue("R/B/A: Public/Quick Match Modes");
        addToQueue("Choose Mode [R/B/A/PR/PB]:", "", true);
        currentState = "MODE_SELECT";
    }
</script>

</body>
</html>
